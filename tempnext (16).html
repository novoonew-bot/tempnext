// ── Perfil do Lugar ───────────────────────────────────────────
function PerfilLugar({lugar, lugarId, user, onBack, onView}){
  const [place, setPlace] = useState(null);
  const [profiles, setProfiles] = useState([]);
  const [momentos, setMomentos] = useState([]);
  const [agendas, setAgendas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [decadaSel, setDecadaSel] = useState(null);

  // Resolve placeId: pode vir direto ou buscar pelo nome
  const [resolvedId, setResolvedId] = useState(lugarId||null);

  useEffect(()=>{
    if(lugarId){ setResolvedId(lugarId); return; }
    if(!lugar) return;
    // Busca place pelo nome
    db.from("places").select("*").or(`name.ilike.%${lugar}%,city.ilike.%${lugar}%`).limit(1).maybeSingle()
      .then(({data})=>{
        if(data){ setPlace(data); setResolvedId(data.id); }
      }).catch(()=>{});
  },[lugar,lugarId]);

  const {seguindo, toggleSeguir, totalSeguidores} = useSeguirLugar(resolvedId, user?.id);

  useEffect(()=>{
    if(!resolvedId) return;
    setLoading(true);

    const buscarDados = async ()=>{
      // Busca o place completo
      if(!place){
        const {data:p} = await db.from("places").select("*").eq("id",resolvedId).maybeSingle();
        if(p) setPlace(p);
      }

      // Busca perfis vinculados a este lugar via place_profiles
      const {data:pp} = await db.from("place_profiles")
        .select("year_start, year_end, place_type, era, profiles!place_profiles_profile_id_fkey(id,name,first_name,last_name,nick,avatar_url,city,state,year_start,year_end,era)")
        .eq("place_id",resolvedId)
        .order("year_start",{ascending:true});

      const vinculados = (pp||[]).map(r=>({
        ...r.profiles,
        pp_year_start:r.year_start,
        pp_year_end:r.year_end,
        pp_type:r.place_type,
        pp_era:r.era
      })).filter(Boolean);
      setProfiles(vinculados);

      // Busca momentos deste lugar (por nome, fallback)
      const lugarNome = place?.name || lugar || "";
      if(lugarNome){
        const {data:m} = await db.from("momentos").select("*")
          .ilike("lugar",`%${lugarNome}%`)
          .order("ts",{ascending:false}).limit(20);
        setMomentos(m||[]);

        const {data:a} = await db.from("momentos").select("*")
          .eq("tipo","agenda_visita").ilike("lugar",`%${lugarNome}%`).limit(5);
        setAgendas(a||[]);
      }

      setLoading(false);
    };
    buscarDados().catch(()=>setLoading(false));
  },[resolvedId]);

  // Agrupa perfis por década
  const porDecada = profiles.reduce((acc,p)=>{
    const dec = Math.floor((p.pp_year_start||p.year_start||2000)/10)*10;
    const label = `${dec}`;
    acc[label]=(acc[label]||[]);
    acc[label].push(p);
    return acc;
  },{});
  const decadas = Object.keys(porDecada).sort();

  // Filtra por década selecionada
  const profilesFiltrados = decadaSel ? (porDecada[decadaSel]||[]) : profiles;

  // Agrupa por era
  const porEra = profiles.reduce((acc,p)=>{
    const era=p.pp_era||p.era||"passado";
    acc[era]=(acc[era]||[]);
    acc[era].push(p);
    return acc;
  },{});

  const lugarNome = place?.name || lugar || "Lugar";
  const lugarCidade = place?.city || "";
  const lugarEstado = place?.state || "";

  if(loading) return(
    <div style={{padding:"100px 24px",textAlign:"center"}}>
      <Spinner size={28}/>
      <div style={{marginTop:12,fontSize:13,color:T.muted}}>Carregando {lugarNome}...</div>
    </div>
  );

  return(
    <div style={{paddingTop:44,paddingBottom:80}}>
      {/* Header */}
      <div style={{padding:"0 16px 0",marginBottom:16}}>
        <div onClick={onBack} style={{fontSize:13,color:T.accent,fontWeight:700,marginBottom:10,cursor:"pointer"}}>← Voltar</div>

        {/* Card principal do lugar */}
        <div style={{background:`linear-gradient(135deg,${T.accentBg},${T.blueBg})`,borderRadius:18,padding:"20px 16px",border:`1px solid ${T.border}`,marginBottom:12}}>
          <div style={{fontSize:22,fontWeight:800,color:T.text,marginBottom:2}}>📍 {lugarNome}</div>
          {lugarCidade&&<div style={{fontSize:12,color:T.sub,marginBottom:10}}>{lugarCidade}{lugarEstado?` – ${lugarEstado}`:""}{place?.country&&place.country!=="Brasil"?` · ${place.country}`:""}</div>}

          {/* Métricas */}
          <div style={{display:"flex",gap:16,marginBottom:14}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:T.accent}}>{profiles.length}</div>
              <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{profiles.length===1?"pessoa":"pessoas"}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:T.blueStrong}}>{totalSeguidores}</div>
              <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{totalSeguidores===1?"seguidor":"seguidores"}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:T.green}}>{momentos.length}</div>
              <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{momentos.length===1?"momento":"momentos"}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:"#9575CD"}}>{decadas.length}</div>
              <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{decadas.length===1?"época":"épocas"}</div>
            </div>
          </div>

          {/* Tags de era */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {Object.entries(porEra).map(([era,ps])=>{
              const e=eraInfo(era);
              return(
                <span key={era} style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,background:`${e.color}18`,color:e.color}}>
                  {e.label}: {ps.length}
                </span>
              );
            })}
          </div>

          {/* Botão seguir */}
          <button onClick={toggleSeguir} style={{
            padding:"10px 20px",borderRadius:20,border:"none",cursor:"pointer",
            background:seguindo?T.accentBg:"linear-gradient(135deg,#C17E3A,#9A5F22)",
            color:seguindo?T.accent:"#fff",
            fontSize:12,fontWeight:700,fontFamily:"inherit",
            borderWidth:seguindo?"1.5px":"0",borderStyle:"solid",borderColor:seguindo?T.accent:"transparent",
            transition:"all .2s",width:"100%",
          }}>
            {seguindo?"✓ Seguindo este lugar":"Seguir este lugar"}
          </button>
        </div>

        {/* ── Linha do Tempo: filtro por década ── */}
        {decadas.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Linha do tempo</div>
            <div style={{display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:4}}>
              <button onClick={()=>setDecadaSel(null)} style={{
                padding:"6px 14px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"inherit",cursor:"pointer",flexShrink:0,
                background:!decadaSel?T.accent:"#fff",color:!decadaSel?"#fff":T.sub,
                border:`1px solid ${!decadaSel?T.accent:T.border}`,transition:"all .15s"
              }}>Todas</button>
              {decadas.map(d=>(
                <button key={d} onClick={()=>setDecadaSel(d===decadaSel?null:d)} style={{
                  padding:"6px 14px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"inherit",cursor:"pointer",flexShrink:0,
                  background:decadaSel===d?T.blueStrong:"#fff",color:decadaSel===d?"#fff":T.sub,
                  border:`1px solid ${decadaSel===d?T.blueStrong:T.border}`,transition:"all .15s"
                }}>Anos {d}</button>
              ))}
            </div>
          </div>
        )}

        {/* ── Quem viveu aqui ── */}
        <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>
          {decadaSel?`Pessoas nos anos ${decadaSel}`:"Quem viveu aqui"} ({profilesFiltrados.length})
        </div>
        {profilesFiltrados.length===0&&(
          <div style={{fontSize:12,color:T.muted,padding:"16px 0",textAlign:"center"}}>Nenhuma pessoa registrada{decadaSel?` nos anos ${decadaSel}`:""}</div>
        )}
        {profilesFiltrados.map((p,i)=>{
          const era=eraInfo(p.pp_era||p.era||"passado");
          const ys=p.pp_year_start||p.year_start||0;
          const ye=p.pp_year_end||p.year_end||0;
          const isMe = user && p.id===user.id;
          return(
            <div key={i} onClick={()=>{if(onView&&!isMe)onView(p);}} style={{background:"#fff",borderRadius:12,border:`1px solid ${isMe?T.accent+"40":T.border}`,padding:"10px 12px",display:"flex",gap:10,alignItems:"center",marginBottom:6,cursor:isMe?"default":"pointer",transition:"all .15s"}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:`${era.color}20`,border:`2px solid ${era.color}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:era.color,flexShrink:0,overflow:"hidden"}}>
                {p.avatar_url?<img src={p.avatar_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:(p.first_name?.[0]||p.name?.[0]||"?")}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:T.text}}>{p.first_name||p.name?.split(" ")[0]}{isMe?" (você)":""}</div>
                <div style={{fontSize:10,color:T.muted}}>{ys}–{ye} · {p.pp_type||p.place_type||""}</div>
              </div>
              <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20,background:`${era.color}18`,color:era.color}}>{era.label}</span>
            </div>
          );
        })}

        {/* ── Momentos deste lugar ── */}
        {momentos.length>0&&(
          <div style={{marginTop:16}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Momentos ({momentos.length})</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3,borderRadius:12,overflow:"hidden",marginBottom:12}}>
              {momentos.slice(0,9).map((m,i)=>(
                <div key={i} style={{aspectRatio:"1",background:`${eraInfo("passado").color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,position:"relative"}}>
                  {m.fotos?.[0]?<img src={m.fotos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"📸"}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── Visitas agendadas ── */}
        {agendas.length>0&&(
          <div style={{background:T.greenBg,borderRadius:14,padding:"12px 14px",border:`1px solid rgba(102,187,106,0.3)`,marginTop:12}}>
            <div style={{fontSize:11,fontWeight:700,color:T.green,marginBottom:6}}>🗓️ Visitas agendadas</div>
            {agendas.map((a,i)=>{
              let meta={};
              try{meta=JSON.parse(a.meta||"{}");}catch{}
              return(
                <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:i<agendas.length-1?6:0}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:T.greenBg,border:`1px solid ${T.green}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:T.green,flexShrink:0}}>
                    {a.user_name?.[0]||"?"}
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:T.text}}>{a.user_name}</div>
                    <div style={{fontSize:10,color:T.muted}}>{meta.data?new Date(meta.data).toLocaleDateString("pt-BR"):""}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Descrição do lugar */}
        {place?.description&&(
          <div style={{marginTop:16,fontSize:12,color:T.sub,lineHeight:1.7,padding:"12px 14px",background:"#fff",borderRadius:12,border:`1px solid ${T.border}`}}>
            {place.description}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────
function App(){
  const [tela,setTela]=useState("inicio");
  const [msgs,setMsgs]=useState({});
  const [contacts,setContacts]=useState([]);
  const [showLogin,setShowLogin]=useState(false);
  const [perfilLugarAtual,setPerfilLugarAtual]=useState(null);
  const [showCuriosidade,setShowCuriosidade]=useState(false);
  const [useCadastroSimples,setUseCadastroSimples]=useState(true);
  const [user,setUser]=useState(()=>{try{const s=localStorage.getItem("tn_user");return s?JSON.parse(s):null;}catch{return null;}});
  const [modal,setModal]=useState(null);
  const [chat,setChat]=useState(null);
  const [showReencontrar,setShowReencontrar]=useState(false);
  const [filtroReencontrar,setFiltroReencontrar]=useState(null);
  const [showMenuRapido,setShowMenuRapido]=useState(false);
  const [showAdicionarLugar,setShowAdicionarLugar]=useState(false);
  const [showAgendaVisita,setShowAgendaVisita]=useState(false);
  const [showMomento,setShowMomento]=useState(false);
  const {alerts,showAlert,dismiss:dismissAlert}=useRegionAlerts(user);

const {notif,dismiss:dismissNotif}=useRegionNotifications(user,contacts);

  // Supabase auth listener + perfil persistence
  useEffect(()=>{
    async function init(){
      // 1. Carrega user do localStorage como base (nunca perde)
      let localUser = null;
      try{
        const s=localStorage.getItem("tn_user");
        if(s) localUser=JSON.parse(s);
      }catch{}

      // 2. Verifica sessão Google
      let session = null;
      try{
        const res = await db.auth.getSession();
        session = res.data?.session;
      }catch(err){
        console.log("Erro ao buscar sessão:", err);
        // Se falhar, mantém o user local
        if(localUser && !user) setUser(localUser);
        return;
      }

      if(session?.user){
        // Tem sessão Google ativa
        try{
          // Busca perfil pelo auth_id
          const {data} = await db.from("profiles").select("*").eq("auth_id",session.user.id).maybeSingle();
          if(data){
            setUser(data);
            try{localStorage.setItem("tn_user",JSON.stringify(data));}catch{}
            return;
          }
        }catch(err){
          console.log("Erro ao buscar perfil por auth_id:", err);
        }

        // Não achou por auth_id — tenta vincular perfil local
        if(localUser && localUser.id && !localUser.id.toString().startsWith("local_")){
          try{
            await db.from("profiles").update({auth_id:session.user.id}).eq("id",localUser.id);
            const updated = {...localUser, auth_id:session.user.id};
            setUser(updated);
            try{localStorage.setItem("tn_user",JSON.stringify(updated));}catch{}
            return;
          }catch(err){
            console.log("Erro ao vincular perfil:", err);
          }
        }

        // Tem sessão mas não tem perfil — mantém localUser se existir
        if(localUser && !user){
          setUser(localUser);
          return;
        }
      } else {
        // Sem sessão Google — usa perfil local
        if(localUser){
          // Atualiza do banco se possível (pra pegar dados mais recentes)
          if(localUser.id && !localUser.id.toString().startsWith("local_")){
            try{
              const {data} = await db.from("profiles").select("*").eq("id",localUser.id).maybeSingle();
              if(data){
                setUser(data);
                try{localStorage.setItem("tn_user",JSON.stringify(data));}catch{}
                return;
              }
            }catch(err){
              console.log("Erro ao buscar perfil do banco:", err);
            }
          }
          // Se não conseguiu buscar do banco, usa o local mesmo
          if(!user) setUser(localUser);
        }
      }
    }
    init();
    const {data:{subscription}}=db.auth.onAuthStateChange(async(event,session)=>{
      if(event==="SIGNED_OUT"){
        setUser(null);
        setContacts([]);
        try{localStorage.removeItem("tn_user");}catch{}
        try{localStorage.removeItem("tn_contacts");}catch{}
      }
      if(event==="SIGNED_IN"&&session?.user){
        try{
          const {data}=await db.from("profiles").select("*").eq("auth_id",session.user.id).maybeSingle();
          if(data){
            setUser(data);
            try{localStorage.setItem("tn_user",JSON.stringify(data));}catch{}
          }
        }catch(err){
          console.log("Erro no auth state change:", err);
        }
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

    // Load contacts from Supabase (with localStorage fallback)
  useEffect(()=>{
    if(!user?.id) return;
    (async()=>{
      try{
        // Busca contatos do Supabase: join com profiles pra trazer dados completos
        const {data,error}=await db.from("contacts")
          .select("contact_id, rel, profiles!contacts_contact_id_fkey(id,name,first_name,last_name,nick,avatar_url,city,state,year_start,year_end,era,place_name,place_type)")
          .eq("user_id",user.id);
        if(!error && data && data.length>0){
          const loaded=data.map(c=>({...c.profiles, _rel:c.rel||"conhecido"})).filter(Boolean);
          setContacts(loaded);
          try{localStorage.setItem("tn_contacts",JSON.stringify(loaded));}catch{}
          return;
        }
      }catch(err){console.log("Erro ao carregar contatos do Supabase:",err);}
      // Fallback: localStorage (migra pro Supabase se tiver dados locais)
      try{
        const c=localStorage.getItem("tn_contacts");
        if(c){
          const local=JSON.parse(c);
          setContacts(local);
          // Migra contatos locais pro Supabase em background
          if(local.length>0){
            const rows=local.map(ct=>({user_id:user.id,contact_id:ct.id,rel:ct._rel||"conhecido"}));
            db.from("contacts").upsert(rows,{onConflict:"user_id,contact_id"}).then(()=>{
              console.log("Contatos migrados pro Supabase:",rows.length);
            }).catch(()=>{});
          }
        }
      }catch{}
    })();
  },[user?.id]);

  function salvar(p){
    setUser(p);
    try{localStorage.setItem("tn_user",JSON.stringify(p));}catch{}
    setTela("perfil");
  }

  async function addContact(p, rel="conhecido"){
    if(!user?.id) return;
    if(contacts.find(c=>c.id===p.id))return;
    const updated=[...contacts,{...p,_rel:rel}];
    setContacts(updated);
    try{localStorage.setItem("tn_contacts",JSON.stringify(updated));}catch{}
    // Persiste no Supabase
    try{
      await db.from("contacts").upsert({user_id:user.id,contact_id:p.id,rel},{onConflict:"user_id,contact_id"});
    }catch(err){console.error("Erro ao salvar contato:",err);}
  }

  async function updateContactRel(id, rel){
    const updated=contacts.map(c=>c.id===id?{...c,_rel:rel}:c);
    setContacts(updated);
    try{localStorage.setItem("tn_contacts",JSON.stringify(updated));}catch{}
    // Atualiza no Supabase
    if(user?.id){
      try{
        await db.from("contacts").update({rel}).eq("user_id",user.id).eq("contact_id",id);
      }catch(err){console.error("Erro ao atualizar rel:",err);}
    }
  }

  function enviar(cid,msg){setMsgs(prev=>({...prev,[cid]:[...(prev[cid]||[]),msg]}));}

  function abrirChat(p,type="msg"){
    setModal(null);
    if(!user){setTela("cadastrar");return;}
    setChat({dest:p,type});
  }

  function logout(){
    setUser(null);
    setContacts([]);
    try{localStorage.removeItem("tn_user");}catch{}
    try{localStorage.removeItem("tn_contacts");}catch{}
    db.auth.signOut();
  }

  function updateUser(p){
    setUser(p);
    try{localStorage.setItem("tn_user",JSON.stringify(p));}catch{}
    // Sincroniza com Supabase em background
    if(p?.id && !p.id.toString().startsWith("local_")){
      db.from("profiles").upsert(p).then(({error})=>{
        if(error) console.log("Erro ao sincronizar perfil:", error);
      }).catch(()=>{});
    }
  }

  const isContact=(p)=>!!contacts.find(c=>c.id===p.id);

  const unreadCount=Object.entries(msgs).filter(([id,ms])=>
    user&&id.split("_").includes(String(user.id))&&ms.some(m=>m.from!==user.id)
  ).length;

  const NAV=[
    {id:"inicio",    icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 10L10 3l7 7v7H13v-4H7v4H3v-7z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/></svg>, label:"Início"},
    {id:"buscar",    icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" strokeWidth="1.6"/><path d="M14 14l4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>, label:"Buscar"},
    {id:"cadastrar", icon:null, label:""},  // botão +
    {id:"encontrei",  icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M14 17v-1a4 4 0 00-8 0v1M10 10a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/><path d="M17 17v-1a4 4 0 00-3-3.87M3 17v-1a4 4 0 013-3.87" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>, label:"Encontrei", badge:contacts.length},
    {id:"perfil",    icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="4" stroke="currentColor" strokeWidth="1.6"/><path d="M3 18a7 7 0 0114 0" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>, label:user?"Perfil":"Entrar"},
  ];

  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:T.bg,position:"relative"}}>
      {tela==="inicio"    &&<Inicio     user={user} onCadastrar={()=>setTela("cadastrar")} onBuscar={()=>setTela("buscar")} onOlhar={()=>setShowReencontrar(true)} onPerfil={()=>setTela("perfil")} onMomento={()=>setShowMomento(true)} onView={setModal} onAdd={p=>{addContact(p);}} onLugar={(lugar)=>{setPerfilLugarAtual(typeof lugar==="string"?lugar:lugar);setTela("lugar_perfil");}} contacts={contacts}/>}
      {tela==="lugar_perfil"&&perfilLugarAtual&&(
          <PerfilLugar lugar={perfilLugarAtual.nome||perfilLugarAtual} lugarId={perfilLugarAtual.id||null} user={user} onBack={()=>setTela("inicio")} onView={setModal}/>
        )}
        {tela==="buscar"    &&<Buscar     onView={setModal} onAdd={p=>{addContact(p);}} contacts={contacts}/>}
      {tela==="cadastrar" &&<Cadastrar  onSave={salvar}/>}
      {tela==="encontrei"  &&<Contatos   user={user} contacts={contacts} onChat={abrirChat} onAdd={addContact} onUpdateRel={updateContactRel} onRemove={()=>{}} onCadastrar={()=>setTela("cadastrar")} onBuscar={()=>setTela("buscar")}/>}
      {tela==="perfil"    &&<Perfil     user={user} onLogout={logout} onCadastrar={()=>setTela("cadastrar")} onUpdateUser={updateUser} onLogin={()=>setShowLogin(true)}/>}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(250,247,242,0.96)",backdropFilter:"blur(16px)",borderTop:`1px solid ${T.border}`,display:"flex",alignItems:"center",padding:"8px 0 22px",zIndex:50}}>
        {NAV.map((t,i)=>{
          if(t.id==="cadastrar")return(
            <div key="add" style={{flex:1,display:"flex",justifyContent:"center"}}>
              <button onClick={()=>setShowMenuRapido(true)} style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${T.accent},${T.accentDk})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(193,126,58,0.4)",marginBottom:4}}>
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4v14M4 11h14" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/></svg>
              </button>
            </div>
          );
          const active=tela===t.id;
          return(
            <button key={t.id} onClick={()=>setTela(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 2px",position:"relative",color:active?T.accent:T.muted,transition:"color .15s"}}>
              {t.icon}
              <span style={{fontSize:10,fontWeight:active?700:400,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.label}</span>
              {t.badge>0&&<div style={{position:"absolute",top:2,right:"18%",minWidth:16,height:16,borderRadius:8,background:T.accent,color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{t.badge}</div>}
            </button>
          );
        })}
      </div>

      {showLogin&&<TelaLogin onClose={()=>setShowLogin(false)} onLoggedIn={p=>{setUser(p);setShowLogin(false);}}/>}
      {notif&&<BannerNotificacao notif={notif} onDismiss={dismissNotif} onView={p=>{setModal(p);dismissNotif();}}/>}
      {showMenuRapido&&<MenuRapido
        user={user}
        onClose={()=>setShowMenuRapido(false)}
        onNovoLugar={()=>{setShowMenuRapido(false);setShowAdicionarLugar(true);}}
        onNovaConversa={()=>setTela("encontrei")}
        onMomento={()=>setShowMomento(true)}
        onAgendaVisita={()=>setShowAgendaVisita(true)}
          onCompartilhar={()=>{
          if(navigator.share&&user){
            navigator.share({title:"Tempnext",text:`Encontre ${user.name} no Tempnext!`,url:window.location.href});
          }
        }}
      />}
      {showAgendaVisita&&user&&(
        <Modal title="Agenda de Visita" onClose={()=>setShowAgendaVisita(false)}>
          <AgendaVisita user={user} onSave={()=>setTimeout(()=>setShowAgendaVisita(false),2000)}/>
        </Modal>
      )}
      {showAdicionarLugar&&user&&<ModalAdicionarLugar
        user={user}
        onClose={()=>setShowAdicionarLugar(false)}
        onSave={p=>{setUser(p);try{localStorage.setItem("tn_user",JSON.stringify(p));}catch{};setShowAdicionarLugar(false);}}
      />}
      {showMomento&&user&&<ModalMomento user={user} onClose={()=>setShowMomento(false)} onSave={()=>{}} onUpdateUser={p=>{setUser(p);try{localStorage.setItem("tn_user",JSON.stringify(p));}catch{}}}/>}
      {showReencontrar&&<ModalReencontrar onClose={()=>setShowReencontrar(false)} onBuscar={f=>{setFiltroReencontrar(f);setTela("buscar");}}/>}
      {showAlert&&<AlertaBanner alerts={alerts} onDismiss={dismissAlert} onView={p=>{dismissAlert();setModal(p);}}/>}
      {modal&&<ModalPerfil p={modal} onClose={()=>setModal(null)} onAdd={p=>{addContact(p);setModal(null);}} onChat={abrirChat} user={user} isContact={isContact(modal)}/>}
      {chat&&user&&<ModalChat user={user} dest={chat.dest} type={chat.type||"msg"} msgs={msgs} onSend={enviar} onClose={()=>setChat(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
