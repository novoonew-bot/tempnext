              {v:"relembrar",  icon:"🕰️", label:"Relembrar",   desc:"Quero reviver memórias desse lugar"},

              <div key={o.v} onClick={()=>setF(v=>({...v,intencao:v.intencao.includes(o.v)?v.intencao.filter(i=>i!==o.v):[...v.intencao,o.v]}))} style={{
                display:"flex",alignItems:"center",gap:12,
                padding:"12px 14px",borderRadius:12,cursor:"pointer",
                border:`1.5px solid ${f.intencao.includes(o.v)?getColor(f.era):T.border}`,
                background:f.intencao.includes(o.v)?getBg(f.era):"#fff",
                transition:"all .15s",
              }}>
                <span style={{fontSize:20}}>{o.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:f.intencao.includes(o.v)?getColor(f.era):T.text}}>{o.label}</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:1}}>{o.desc}</div>
                </div>
                {f.intencao.includes(o.v)&&<div style={{width:20,height:20,borderRadius:"50%",background:getColor(f.era),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>}
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:T.muted,marginTop:8}}>Pode selecionar mais de uma opção</div>
        </FRow>
        <STitle style={{color:getColor(f.era)}}>{getLbl(f.era,"disponivel")}</STitle>
          <FRow>
            <div style={{display:"flex",gap:8}}>
              {[{v:"sim",l:"Relembrar"},{v:"mensagem",l:"Só mensagem"},{v:"nao",l:"Por enquanto não"}].map(o=>(
                <div key={o.v} onClick={()=>setF({...f,available:o.v})} style={{
                  flex:1,padding:"10px 6px",borderRadius:10,cursor:"pointer",textAlign:"center",
                  border:`1.5px solid ${f.available===o.v?T.accent:T.border}`,
                  background:f.available===o.v?T.accentBg:"#fff",
                  fontSize:12,fontWeight:f.available===o.v?700:400,
                  color:f.available===o.v?T.accent:T.muted,
                  transition:"all .15s",
                }}>{o.l}</div>
              ))}
            </div>
          </FRow>

          <div style={{paddingTop:20}}>
            <Btn full onClick={salvar} disabled={saving||!f.name.trim()} size="lg">
              {saving?<><Spinner/>Salvando…</>:"Salvar alterações"}
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Screen: Perfil ──────────────────────────────────────────
function Perfil({user,onLogout,onCadastrar,onUpdateUser,onLogin}){
  const [editando,setEditando]=useState(false);
  const [fotoExpandida,setFotoExpandida]=useState(null);
  if(!user)return(
    <div style={{padding:"80px 20px",textAlign:"center"}}>
      <Logo size="lg"/>
      <div style={{marginTop:24,fontSize:15,color:T.sub,lineHeight:1.8,marginBottom:28}}>O seu lugar no tempo.</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <Btn full onClick={onCadastrar} size="lg">Criar meu perfil</Btn>
        <Btn full variant="outline" onClick={onLogin} size="lg">Já tenho conta — Entrar</Btn>
      </div>
    </div>
  );
  const era=eraInfo(user.era||"passado");

  async function handleNewAvatar(e){
    const file=e.target.files[0]; if(!file)return;
    try{
      const url = await uploadImage(file, "avatars", user.id);
      const updated={...user,avatar_url:url};
      onUpdateUser(updated);
      try{await db.from("profiles").update({avatar_url:url}).eq("id",user.id);}catch(err){console.error("update profile avatar:",err);}
    }catch(err){
      console.error("Falha no upload do avatar:", err);
      alert("Não consegui enviar a foto. Tente novamente ou escolha outra imagem.");
    }
  }
  async function handleMorePhotos(e){
    const files=Array.from(e.target.files).slice(0,6);
    if(files.length===0)return;
    try{
      const urls = await Promise.all(files.map(f=>uploadImage(f, "photos", user.id)));
      const newPhotos=[...(user.photos||[]),...urls].slice(0,6);
      onUpdateUser({...user,photos:newPhotos});
      try{await db.from("profiles").update({photos:newPhotos}).eq("id",user.id);}catch(err){console.error("update profile photos:",err);}
    }catch(err){
      console.error("Falha no upload das fotos:", err);
      alert("Não consegui enviar alguma das fotos. Tente novamente.");
    }
  }

  const availableLabel={sim:"Relembrar",mensagem:"Só mensagem",nao:"Por enquanto não"};
  const availableColor={sim:T.green,mensagem:T.accent,nao:T.muted};

  return(
    <div style={{padding:"0 18px 100px"}}>
      <div style={{paddingTop:52,paddingBottom:20}}>
        <Logo/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:T.text}}>Meu perfil</div>
          </div>
          <button onClick={()=>setEditando(true)} style={{
            display:"flex",alignItems:"center",gap:6,
            background:T.accentBg,border:`1px solid ${T.accent}`,
            borderRadius:20,padding:"8px 16px",cursor:"pointer",
            fontSize:13,fontWeight:700,color:T.accent,fontFamily:"inherit",
            transition:"all .15s",
          }}>
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M9 1.5l2.5 2.5-7 7L2 12l.5-2.5 7-7z" stroke={T.accent} strokeWidth="1.4" strokeLinejoin="round"/></svg>
            Editar
          </button>
        </div>
      </div>

      {/* Banner + Avatar */}
      <div style={{background:"#fff",borderRadius:18,overflow:"hidden",border:`1px solid ${T.border}`,marginBottom:12}}>
        <div style={{height:90,background:`linear-gradient(135deg,${T.accentBg},rgba(21,101,192,0.1))`,position:"relative"}}>
          <div style={{position:"absolute",bottom:-28,left:20}}>
            <div style={{position:"relative"}}>
              <Avatar name={user.name} src={user.avatar_url} size={72}/>
              <label style={{position:"absolute",bottom:2,right:2,width:22,height:22,borderRadius:"50%",background:T.accent,border:"2px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M4.5 1.5v6M1.5 4.5h6" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg>
                <input type="file" accept="image/*" onChange={handleNewAvatar} style={{display:"none"}}/>
              </label>
            </div>
          </div>
        </div>
        <div style={{padding:"36px 20px 18px"}}>
          {/* Nome limpo */}
          <div style={{display:"flex",alignItems:"baseline",gap:12,flexWrap:"wrap"}}>
            <div style={{fontSize:20,fontWeight:700,color:T.text}}>{user.name}</div>
          </div>


        </div>
      </div>

      {/* Status — como estou / disponível / conectado ao */}
      {/* Connections count */}
      <div style={{background:"#fff",borderRadius:18,padding:"12px 18px",border:`1px solid ${T.border}`,marginBottom:12,display:"flex",gap:16}}>
        {[
          {label:"Encontrei",value:String(user._connections||0)},
          {label:"Lugares",value:String(user.lugares?.length||1)},
          {label:"Momentos",value:String(user._moments||0)},
        ].map(({label,value},i,arr)=>(
          <div key={label} style={{flex:1,textAlign:"center",borderRight:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
            <div style={{fontSize:18,fontWeight:800,color:T.text,letterSpacing:"-0.5px"}}>{value}</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600}}>{label}</div>
          </div>
        ))}
      </div>

      {/* Cápsulas ativas — só o dono vê */}
      {(()=>{
        let capsulas=[];
        try{capsulas=JSON.parse(localStorage.getItem("tn_capsulas_"+user?.id)||"[]");}catch{}
        if(!capsulas.length)return null;
        return(
          <div style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:22,height:22,borderRadius:6,background:`rgba(149,117,205,0.12)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke={T.purple} strokeWidth="1.2"/><path d="M6 3.5V6l1.5 1" stroke={T.purple} strokeWidth="1.2" strokeLinecap="round"/></svg>
                </div>
                <div style={{fontSize:11,fontWeight:700,color:T.purple}}>Cápsulas do Tempo</div>
              </div>
              <span style={{fontSize:9,fontWeight:700,background:`rgba(149,117,205,0.1)`,color:T.purple,padding:"2px 8px",borderRadius:20}}>Só você vê</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {capsulas.map((cap,i)=>(
                <CapsulaPerfil key={i} capsula={cap} index={i} userId={user?.id}/>
              ))}
            </div>
            <div
              onClick={()=>{setShowAgendaVisita(true);}}
              style={{marginTop:8,padding:"8px 12px",borderRadius:10,border:`1.5px dashed rgba(149,117,205,0.4)`,background:`rgba(149,117,205,0.03)`,fontSize:11,fontWeight:600,color:T.purple,textAlign:"center",cursor:"pointer"}}
            >
              + Nova cápsula
            </div>
          </div>
        );
      })()}
      {(user.available||user.era||user.intencao?.length>0)&&(
        <div style={{background:"#fff",borderRadius:18,padding:"14px 18px",border:`1px solid ${T.border}`,marginBottom:12,display:"flex",flexDirection:"column",gap:10}}>
          {user.intencao?.length>0&&(
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:11,fontWeight:600,color:T.muted,minWidth:100}}>Quero</span>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {user.intencao.map((v,i)=>{
                  const map={relembrar:{icon:"🕰️",label:"Relembrar"},reencontrar:{icon:"👥",label:"Reencontrar"},reconectar:{icon:"🤝",label:"Reconectar"},visitar:{icon:"👁️",label:"Visitar"}};
                  const item=map[v]||{icon:"✨",label:v};
                  return <span key={i} style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:T.accentBg,color:T.accent,display:"flex",alignItems:"center",gap:4}}>{item.icon} {item.label}</span>;
                })}
              </div>
            </div>
          )}
          {user.era&&(
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,fontWeight:600,color:T.muted,minWidth:100}}>Conectado ao</span>
              <span style={{fontSize:11,fontWeight:700,color:era.color,background:`${era.color}15`,padding:"4px 12px",borderRadius:20,textTransform:"uppercase",letterSpacing:"0.05em"}}>{era.label}</span>
            </div>
          )}
          {user.available&&(
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,fontWeight:600,color:T.muted,minWidth:100}}>Disponível para</span>
              <span style={{fontSize:11,fontWeight:700,color:availableColor[user.available]||T.muted,background:`${availableColor[user.available]||T.muted}15`,padding:"4px 12px",borderRadius:20}}>{availableLabel[user.available]||user.available}</span>
            </div>
          )}
        </div>
      )}

      {user.lugares?.length>0&&(()=>{
        const passado=user.lugares.filter(l=>(l.era||detectarEra(l.y1,l.y2))==="passado");
        const presente=user.lugares.filter(l=>(l.era||detectarEra(l.y1,l.y2))==="presente");
        const futuro=user.lugares.filter(l=>(l.era||detectarEra(l.y1,l.y2))==="futuro");
        const grupos=[
          {label:"Lugares do passado",list:passado,color:"#9575CD"},
          {label:"Lugares do presente",list:presente,color:T.blue},
          {label:"Lugares do futuro",list:futuro,color:T.green},
        ].filter(g=>g.list.length>0);
        return grupos.map(grupo=>(
          <div key={grupo.label} style={{background:"#fff",borderRadius:18,padding:"16px 18px",border:`1px solid ${T.border}`,marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:grupo.color,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>{grupo.label}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {grupo.list.map((loc,i)=>(
                <div key={i} style={{padding:"10px 12px",background:T.faint,borderRadius:10,border:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <div style={{fontWeight:600,fontSize:14,color:T.text}}>{loc.placeName}</div>
                    {(()=>{const e=eraInfo(loc.era||detectarEra(loc.y1,loc.y2));return <span style={{fontSize:10,fontWeight:700,color:e.color,background:`${e.color}15`,padding:"2px 8px",borderRadius:20,textTransform:"uppercase"}}>{e.label}</span>})()}
                  </div>
                  <div style={{fontSize:12,color:T.muted,marginTop:2}}>{loc.city} – {loc.uf} · {loc.y1}–{loc.y2} · {placeLabel(loc.placeType)}</div>
                </div>
              ))}
            </div>
          </div>
        ));
      })()}

      {/* Sobre você */}
      <div style={{background:"#fff",borderRadius:18,overflow:"hidden",border:`1px solid ${T.border}`,marginBottom:12}}>
        {[
          ["Município",`${user.city} – ${user.state}`],
          ["Local",user.place_name],
          ["Lugar",placeLabel(user.place_type)],
          ["Período",`${user.year_start} – ${user.year_end}`],
          (user.current_city||user.current_state)&&["Atualmente estou em",[user.current_city,user.current_state,user.current_country&&user.current_country!=="Brasil"?user.current_country:null].filter(Boolean).join(", ")],
        ].filter(Boolean).map(([l,v],i,arr)=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 18px",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
            <span style={{fontSize:12,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{l}</span>
            <span style={{fontSize:13,color:T.text,fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{v}</span>
          </div>
        ))}
      </div>

      {/* Memória */}
      {user.note&&(
        <div style={{background:"#fff",borderRadius:18,padding:"16px 18px",border:`1px solid ${T.border}`,marginBottom:12}}>
          <Lbl>Memória</Lbl>
          <div style={{fontSize:14,color:T.sub,lineHeight:1.6,fontStyle:"italic",marginTop:4}}>"{user.note}"</div>
        </div>
      )}

      {/* Família + fato marcante */}
      {(user.family_ref||user.how_iam)&&(
        <div style={{background:"#fff",borderRadius:18,overflow:"hidden",border:`1px solid ${T.border}`,marginBottom:12}}>
          {user.family_ref&&(
            <div style={{padding:"12px 18px",borderBottom:user.how_iam?`1px solid ${T.border}`:"none"}}>
              <Lbl>Nomes na família</Lbl>
              <div style={{fontSize:14,color:T.sub,marginTop:4}}>{user.family_ref}</div>
            </div>
          )}
        </div>
      )}

      {/* Do que mais gosta hoje? */}
      {(user.interests?.length>0||user.curtia?.length>0)&&(
        <div style={{background:"#fff",borderRadius:18,padding:"16px 18px",border:`1px solid ${T.border}`,marginBottom:12}}>
          {/* Comparação dinâmica antes x agora */}
          {user.curtia?.length>0&&user.interests?.length>0?(
            <div>
              <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                <span>Antes</span>
                <div style={{flex:1,height:1,background:T.border}}/>
                <span>Agora</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:"#9575CD",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Gostava de</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {user.curtia.map((item,i)=>{
                      const ainda=user.interests?.includes(item);
                      return <span key={i} style={{padding:"4px 10px",borderRadius:20,background:ainda?"rgba(123,94,167,0.15)":"rgba(123,94,167,0.06)",color:ainda?"#9575CD":"#9B7DB7",fontSize:11,fontWeight:600,border:`1px solid ${ainda?"#9575CD":"rgba(123,94,167,0.2)"}`,position:"relative"}}>{item}{ainda&&<span style={{fontSize:8,marginLeft:3}}>✓</span>}</span>;
                    })}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Gosto de</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {user.interests.map((item,i)=>{
                      const novo=!user.curtia?.includes(item);
                      return <span key={i} style={{padding:"4px 10px",borderRadius:20,background:novo?T.accentBg:"rgba(193,126,58,0.06)",color:novo?T.accent:"#C9946A",fontSize:11,fontWeight:600,border:`1px solid ${novo?T.accent:"rgba(193,126,58,0.2)"}`}}>{item}{novo&&<span style={{fontSize:8,marginLeft:3}}>novo</span>}</span>;
                    })}
                  </div>
                </div>
              </div>
              {/* Interesses em comum */}
              {user.curtia.filter(i=>user.interests?.includes(i)).length>0&&(
                <div style={{marginTop:12,padding:"10px 12px",background:"rgba(46,125,94,0.06)",borderRadius:10,border:"1px solid rgba(46,125,94,0.15)"}}>
                  <div style={{fontSize:11,fontWeight:700,color:T.green,marginBottom:6}}>Sempre curtiu</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {user.curtia.filter(i=>user.interests?.includes(i)).map((item,i)=>(
                      <span key={i} style={{padding:"4px 10px",borderRadius:20,background:"rgba(46,125,94,0.1)",color:T.green,fontSize:11,fontWeight:600}}>
                        {item}
                      </span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ):(
            <div>
              {user.curtia?.length>0&&(
                <div style={{marginBottom:user.interests?.length>0?12:0}}>
                  <Lbl>O que curtia</Lbl>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                    {user.curtia.map((item,i)=><span key={i} style={{padding:"5px 12px",borderRadius:20,background:"rgba(123,94,167,0.1)",color:"#9575CD",fontSize:12,fontWeight:600}}>{item}</span>)}
                  </div>
                </div>
              )}
              {user.interests?.length>0&&(
                <div>
                  <Lbl>Do que mais gosta hoje?</Lbl>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                    {user.interests.map((item,i)=><span key={i} style={{padding:"5px 12px",borderRadius:20,background:T.accentBg,color:T.accent,fontSize:12,fontWeight:600}}>{item}</span>)}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* Redes sociais */}


      {/* Múltiplos lugares */}
      {/* Fotos */}
      <div style={{background:"#fff",borderRadius:18,padding:"16px 18px",border:`1px solid ${T.border}`,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <Lbl>Fotos da época ({user.photos?.length||0}/6)</Lbl>
          <label style={{cursor:"pointer",fontSize:13,color:T.accent,fontWeight:700,textDecoration:"underline",textUnderlineOffset:3}}>
            + Adicionar
            <input type="file" accept="image/*" multiple onChange={handleMorePhotos} style={{display:"none"}}/>
          </label>
        </div>
        {(!user.photos||user.photos.length===0)
          ?<label style={{display:"block",border:`1.5px dashed ${T.borderMd}`,borderRadius:12,padding:"24px",cursor:"pointer",textAlign:"center",background:T.faint}}>
            <div style={{fontSize:13,color:T.sub,fontWeight:600}}>Adicionar fotos daquela época</div>
            <div style={{fontSize:11,color:T.muted,marginTop:3}}>Ajuda as pessoas a te reconhecerem</div>
            <input type="file" accept="image/*" multiple onChange={handleMorePhotos} style={{display:"none"}}/>
          </label>
          :<div>
            <div style={{display:"flex",gap:8,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:8}}>
              {user.photos.map((src,i)=>(
                <div key={i} style={{flexShrink:0,width:110,position:"relative"}}>
                  <div style={{width:110,height:110,borderRadius:10,overflow:"hidden",border:`1px solid ${T.border}`,cursor:"zoom-in"}}
                    onClick={()=>setFotoExpandida(src)}>
                    <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  </div>
                  <button onClick={async()=>{
                    const novas=user.photos.filter((_,j)=>j!==i);
                    onUpdateUser({...user,photos:novas});
                    try{await db.from("profiles").update({photos:novas}).eq("id",user.id);}catch{}
                  }} style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
                </div>
              ))}
              {user.photos.length<6&&(
                <label style={{flexShrink:0,width:110,height:110,borderRadius:10,border:`1.5px dashed ${T.borderMd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:T.faint}}>
                  <span style={{fontSize:26,color:T.accent}}>+</span>
                  <input type="file" accept="image/*" multiple onChange={handleMorePhotos} style={{display:"none"}}/>
                </label>
              )}
            </div>
          </div>
        }
      </div>

      {fotoExpandida&&<ModalFoto src={fotoExpandida} onClose={()=>setFotoExpandida(null)}/>}

      <Btn variant="danger" full onClick={onLogout}>Sair da conta</Btn>

      {editando&&<ModalEditarPerfil
        user={user}
        onClose={()=>setEditando(false)}
        onSave={p=>{onUpdateUser(p);setEditando(false);}}
      />}
    </div>
  );
}


// ── Modal: Foto Fullscreen ────────────────────────────────────
function ModalFoto({src,onClose}){
  if(!src)return null;
  return(
    <div className="fi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
      <button onClick={onClose} style={{position:"absolute",top:16,right:16,width:40,height:40,borderRadius:"50%",background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:301}}>×</button>
      <img src={src} alt="" style={{maxWidth:"95vw",maxHeight:"90vh",objectFit:"contain",borderRadius:4}} onClick={e=>e.stopPropagation()}/>
    </div>
  );
}

// ── Foto com curtida e comentário ────────────────────────────
function FotoInterativa({src,user}){
  const [likes,setLikes]=useState(0);
  const [liked,setLiked]=useState(false);
  const [showComments,setShowComments]=useState(false);
  const [comments,setComments]=useState([]);
  const [newComment,setNewComment]=useState("");
  const [fullscreen,setFullscreen]=useState(false);

  function toggleLike(){setLiked(v=>!v);setLikes(v=>liked?v-1:v+1);}
  function addComment(){
    if(!newComment.trim()||!user)return;
    setComments(v=>[...v,{name:user.name,text:newComment.trim(),ts:Date.now()}]);
    setNewComment("");
  }
  return(
    <div style={{marginBottom:12}}>
      <div style={{borderRadius:12,overflow:"hidden",border:`1px solid ${T.border}`,background:"#fff"}}>
        <img src={src} alt="" onClick={()=>setFullscreen(true)} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block",cursor:"zoom-in"}}/>
        <div style={{padding:"10px 12px 6px",display:"flex",alignItems:"center",gap:16}}>
          <button onClick={toggleLike} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:liked?T.red:T.muted,fontFamily:"inherit",fontSize:13,fontWeight:600,padding:0}}>
            <svg width="18" height="17" viewBox="0 0 18 17" fill={liked?"#e74c3c":"none"}><path d="M9 15.5S1.5 10.5 1.5 5.5a4 4 0 017.5-2 4 4 0 017.5 2C16.5 10.5 9 15.5 9 15.5z" stroke={liked?"#e74c3c":T.muted} strokeWidth="1.5" strokeLinejoin="round"/></svg>
            {likes>0&&<span>{likes}</span>}
          </button>
          <button onClick={()=>setShowComments(v=>!v)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:T.muted,fontFamily:"inherit",fontSize:13,fontWeight:600,padding:0}}>
            <svg width="17" height="16" viewBox="0 0 17 16" fill="none"><path d="M1 1h15v10H9.5l-3 3V11H1V1z" stroke={T.muted} strokeWidth="1.5" strokeLinejoin="round"/></svg>
            {comments.length>0&&<span>{comments.length}</span>}
          </button>
        </div>
        {showComments&&(
          <div style={{padding:"0 12px 12px",borderTop:`1px solid ${T.border}`}}>
            {comments.length===0?<div style={{fontSize:12,color:T.muted,padding:"8px 0"}}>Nenhum comentário ainda.</div>
              :comments.map((c,i)=>(
                <div key={i} style={{padding:"6px 0",borderBottom:i<comments.length-1?`1px solid ${T.faint}`:"none"}}>
                  <span style={{fontWeight:700,fontSize:12,color:T.text}}>{c.name} </span>
                  <span style={{fontSize:12,color:T.sub}}>{c.text}</span>
                </div>
              ))}
            {user&&(
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <input placeholder="Comentário…" value={newComment} onChange={e=>setNewComment(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addComment()} style={{flex:1,padding:"8px 12px",fontSize:13,borderRadius:20}}/>
                <button onClick={addComment} style={{background:T.accent,border:"none",borderRadius:20,padding:"8px 14px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>Ok</button>
              </div>
            )}
          </div>
        )}
      </div>
      {fullscreen&&<ModalFoto src={src} onClose={()=>setFullscreen(false)}/>}
    </div>
  );
}

// ── Modal: Ver Perfil ─────────────────────────────────────────
function ModalPerfil({p,onClose,onAdd,onChat,user,isContact}){
  const era=eraInfo(p.era||"passado");

  // ── Calcula matches de lugar+época com o user logado ──
  const matches = (()=>{
    if(!user || user.id===p.id) return [];
    const meusLugares = user.lugares||[{city:user.city,uf:user.state,y1:String(user.year_start||0),y2:String(user.year_end||0),placeName:user.place_name}];
    const delesLugares = p.lugares||[{city:p.city,uf:p.state,y1:String(p.year_start||0),y2:String(p.year_end||0),placeName:p.place_name}];
    const result = [];
    for(const ml of meusLugares){
      for(const dl of delesLugares){
        const mCity = (ml.city||"").toLowerCase().trim();
        const dCity = (dl.city||"").toLowerCase().trim();
        if(!mCity||!dCity||mCity!==dCity) continue;
        // Verifica overlap temporal
        const mStart=parseInt(ml.y1||ml.year_start)||0;
        const mEnd=parseInt(ml.y2||ml.year_end)||0;
        const dStart=parseInt(dl.y1||dl.year_start)||0;
        const dEnd=parseInt(dl.y2||dl.year_end)||0;
        const overlapStart=Math.max(mStart,dStart);
        const overlapEnd=Math.min(mEnd||2026,dEnd||2026);
        if(overlapStart<=overlapEnd && overlapStart>0){
          const anos = overlapEnd-overlapStart;
          result.push({
            city:dl.city||ml.city,
            place:dl.placeName||dl.place_name||ml.placeName||ml.place_name||"",
            from:overlapStart,to:overlapEnd,anos,
            decada:Math.floor(overlapStart/10)*10
          });
        }
      }
    }
    return result;
  })();

  return(
    <div className="fi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:90,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(3px)"}}>
      <div className="su" onClick={e=>e.stopPropagation()} style={{background:"#FAF7F2",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:430,maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{padding:"12px 0 0",display:"flex",justifyContent:"center"}}>
          <div style={{width:36,height:4,borderRadius:2,background:T.border}}/>
        </div>

        {/* ── Banner de Match de Época ── */}
        {matches.length>0&&(
          <div style={{margin:"10px 16px 0",background:"linear-gradient(135deg,rgba(193,126,58,0.12),rgba(30,136,229,0.10))",border:`1.5px solid ${T.accent}40`,borderRadius:16,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-8,right:-8,fontSize:48,opacity:0.12}}>✨</div>
            <div style={{fontSize:13,fontWeight:800,color:T.accent,marginBottom:6}}>
              Vocês se cruzaram!
            </div>
            {matches.map((m,i)=>(
              <div key={i} style={{fontSize:12,color:T.text,lineHeight:1.7}}>
                📍 <strong>{m.city}</strong> — {m.from}–{m.to}
                {m.anos>0&&<span style={{fontSize:10,color:T.muted}}> ({m.anos} {m.anos===1?"ano":"anos"} juntos)</span>}
              </div>
            ))}
            <div style={{fontSize:10,color:T.muted,marginTop:6,fontStyle:"italic"}}>
              Vocês compartilham memórias do mesmo lugar na mesma época
            </div>
          </div>
        )}

        {/* Foto de capa */}
        <div style={{height:140,background:`linear-gradient(135deg,${T.accentBg},rgba(21,101,192,0.08))`,position:"relative",margin:"8px 0 0"}}>
          {p.avatar_url&&<img src={p.avatar_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:.4}}/>}
          <div style={{position:"absolute",bottom:-30,left:20}}>
            <Avatar name={p.name} src={p.avatar_url} size={72}/>
          </div>
        </div>
        <div style={{padding:"40px 20px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{fontSize:22,fontWeight:700,color:T.text}}>{p.name}</div>
            {p.how_iam&&(
              <div style={{display:"inline-flex",alignItems:"center",gap:5,background:T.accentBg,border:`1px solid ${T.accent}`,borderRadius:20,padding:"3px 12px"}}>
                <span style={{fontSize:11,fontWeight:700,color:T.accent}}>Estou</span>
                <span style={{fontSize:11,color:T.sub}}>{p.how_iam}</span>
              </div>
            )}
          </div>
          <span style={{fontSize:10,fontWeight:700,color:era.color,background:`${era.color}15`,padding:"2px 10px",borderRadius:20,textTransform:"uppercase",letterSpacing:"0.05em",display:"inline-block",marginTop:8}}>{era.label}</span>
          {/* Apelido e como era conhecido — visível apenas para contatos */}
          {isContact&&(p.nick||p.known_as)&&(
            <div style={{marginTop:10,padding:"10px 14px",background:T.faint,borderRadius:10,border:`1px solid ${T.border}`}}>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Informações dos contatos</div>
              {p.nick&&<div style={{fontSize:13,color:T.sub,marginBottom:2}}>Apelido: <strong>"{p.nick}"</strong></div>}
              {p.known_as&&<div style={{fontSize:13,color:T.sub,fontStyle:"italic"}}>Conhecido como: <strong>{p.known_as}</strong></div>}
            </div>
          )}
        </div>
        <div style={{padding:"16px 20px 32px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:T.surface,borderRadius:14,overflow:"hidden",border:`1px solid ${T.border}`}}>
            {[["Local",p.place_name],["Município",`${p.city} – ${p.state}`],["Período",`${p.year_start} – ${p.year_end}`],["Tipo",placeLabel(p.place_type)]].map(([l,v],i,arr)=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"11px 16px",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
                <span style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{l}</span>
                <span style={{fontSize:13,color:T.text,fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{v}</span>
              </div>
            ))}
          </div>
          {p.note&&<div style={{background:T.surface,borderRadius:14,padding:"14px 16px",border:`1px solid ${T.border}`}}>
            <div style={{fontSize:14,color:T.sub,lineHeight:1.6,fontStyle:"italic"}}>"{p.note}"</div>
          </div>}
          {p.photos?.length>0&&(
            <div>
              <Lbl>Fotos da época</Lbl>
              <div style={{marginTop:8}}>
                {p.photos.map((src,i)=>(
                  <FotoInterativa key={i} src={src} user={user}/>
                ))}
              </div>
            </div>
          )}
          {user&&user.id!==p.id?(
            isContact
              ?<div style={{display:"flex",gap:10}}>
                <Btn full onClick={()=>{onChat(p,"call");onClose();}} variant="outline" size="lg">📞 Chamar</Btn>
                <Btn full onClick={()=>{onChat(p,"msg");onClose();}} size="lg">💬 Mensagem</Btn>
              </div>
              :<div style={{display:"flex",gap:10}}>
                <Btn full onClick={()=>{onAdd(p);onClose();}} size="lg">+ Adicionar contato</Btn>
              </div>
          ):!user&&<div style={{textAlign:"center",fontSize:13,color:T.muted}}>Crie seu perfil para interagir</div>}
        </div>
      </div>
    </div>
  );
}

// ── Modal: Chat ───────────────────────────────────────────────
function ModalChat({user,dest,type="msg",msgs,onSend,onClose}){
  const [txt,setTxt]=useState("");
  const [mediaPreview,setMediaPreview]=useState(null);
  const [mediaFile,setMediaFile]=useState(null);
  const [mediaType,setMediaType]=useState(null);
  const [isRecording,setIsRecording]=useState(false);
  const [audioBlob,setAudioBlob]=useState(null);
  const recorderRef=useRef(null);
  const endRef=useRef();

  function toggleRecord(){
    if(isRecording){
      recorderRef.current?.stop();
      setIsRecording(false);
    } else {
      navigator.mediaDevices?.getUserMedia({audio:true}).then(stream=>{
        const rec=new MediaRecorder(stream);
        const chunks=[];
        rec.ondataavailable=e=>chunks.push(e.data);
        rec.onstop=()=>{
          const blob=new Blob(chunks,{type:"audio/webm"});
          setAudioBlob(URL.createObjectURL(blob));
          stream.getTracks().forEach(t=>t.stop());
        };
        recorderRef.current=rec;
        rec.start();
        setIsRecording(true);
      }).catch(()=>alert("Permita acesso ao microfone"));
    }
  }
  const cid=[String(user.id),String(dest.id)].sort().join("_");
  const ms=msgs[cid]||[];
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[ms.length]);

  async function send(){
    if(!txt.trim()&&!mediaFile&&!audioBlob)return;
    const msg={from:user.id,text:txt.trim(),ts:Date.now(),media:mediaFile||null,mediaType:mediaType||null,audio:audioBlob||null};
    onSend(cid,msg);
    setTxt("");setMediaPreview(null);setMediaFile(null);setMediaType(null);setAudioBlob(null);
    try{await db.from("messages").insert({conv_id:cid,from_id:user.id,text:txt.trim()||"[mídia]"});}catch{}
  }

  return(
    <div style={{position:"fixed",inset:0,background:"#FAF7F2",zIndex:100,display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto"}}>
      {/* Header */}
      <div style={{padding:"52px 18px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:12,background:T.surface}}>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",padding:"0 10px 0 0",color:T.text}}>
          <svg width="10" height="17" viewBox="0 0 10 17" fill="none"><path d="M9 1L1 8.5L9 16" stroke={T.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <Avatar name={dest.name} src={dest.avatar_url} size={38}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15,color:T.text}}>{dest.name}</div>
          <div style={{color:T.muted,fontSize:11,marginTop:1}}>Conversa privada</div>
        </div>
        <button onClick={()=>{}} style={{width:34,height:34,borderRadius:"50%",background:T.faint,border:`1px solid ${T.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M5.5 2C5.5 2 3 5 3 7.5c0 3 2.5 6 7.5 7 3 0 6-2.5 6-2.5L14.5 9.5l-3 .8S10 9 9.5 8.5 9 6.5 9 6.5L9.5 4 5.5 2z" stroke={T.sub} strokeWidth="1.3" strokeLinejoin="round"/></svg>
        </button>
      </div>

      {/* Chamada de voz UI */}
      {type==="call"&&(
        <div style={{padding:"28px 20px",textAlign:"center",borderBottom:`1px solid ${T.border}`,background:T.faint}}>
          <Avatar name={dest.name} src={dest.avatar_url} size={72}/>
          <div style={{fontSize:16,fontWeight:600,color:T.text,marginTop:14,marginBottom:4}}>{dest.name}</div>
          <div style={{fontSize:12,color:T.muted,marginBottom:20}}>Chamada de voz</div>
          <div style={{display:"flex",gap:24,justifyContent:"center"}}>
            <div style={{textAlign:"center"}}>
              <button onClick={onClose} style={{width:56,height:56,borderRadius:"50%",background:"#e74c3c",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 6px",boxShadow:"0 4px 14px rgba(231,76,60,0.35)"}}>
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><line x1="4" y1="4" x2="18" y2="18" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/><line x1="18" y1="4" x2="4" y2="18" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/></svg>
              </button>
              <div style={{fontSize:11,color:T.muted}}>Encerrar</div>
            </div>
            <div style={{textAlign:"center"}}>
              <button style={{width:56,height:56,borderRadius:"50%",background:T.accent,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 6px",boxShadow:"0 4px 14px rgba(193,126,58,0.35)"}}>
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M7 2C7 2 4 6 4 9c0 4 3 9 10 10 4 0 9-3 9-3L20.5 12.5l-4 1S14 12 13 11s-1.5-4-1.5-4L12.5 4 7 2z" stroke="#fff" strokeWidth="1.8" strokeLinejoin="round" fill="rgba(255,255,255,0.2)"/></svg>
              </button>
              <div style={{fontSize:11,color:T.muted}}>Atender</div>
            </div>
          </div>
          <div style={{marginTop:18,fontSize:12,color:T.muted,padding:"8px 14px",background:T.accentBg,borderRadius:8}}>Chamadas em tempo real — em breve</div>
        </div>
      )}

      {/* Mensagens */}
      <div style={{flex:1,overflowY:"auto",padding:"18px 18px 8px",display:"flex",flexDirection:"column",gap:10}}>
        {ms.length===0&&<div style={{textAlign:"center",color:T.muted,fontSize:13,marginTop:40,lineHeight:1.7}}>Nenhuma mensagem ainda.<br/>Diga olá!</div>}
        {ms.map((m,i)=>{
          const mine=m.from===user.id;
          return(
            <div key={i} style={{display:"flex",justifyContent:mine?"flex-end":"flex-start"}}>
              <div style={{background:mine?`linear-gradient(135deg,${T.accent},${T.accentDk})`:"#fff",color:mine?"#fff":T.text,border:mine?"none":`1px solid ${T.border}`,borderRadius:mine?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:m.media||m.audio?"8px":"11px 15px",maxWidth:"76%",fontSize:14,lineHeight:1.5,boxShadow:mine?"0 2px 10px rgba(193,126,58,0.25)":"0 1px 4px rgba(0,0,0,0.05)",overflow:"hidden"}}>
                {m.media&&m.mediaType==="image"&&<img src={m.media} alt="" style={{width:"100%",maxWidth:220,display:"block",borderRadius:10,marginBottom:m.text?6:0}}/>}
                {m.media&&m.mediaType==="video"&&<video src={m.media} controls style={{width:"100%",maxWidth:220,display:"block",borderRadius:10,marginBottom:m.text?6:0}}/>}
                {m.audio&&<audio src={m.audio} controls style={{width:"100%",maxWidth:220,display:"block",marginBottom:m.text?6:0}}/>}
                {m.text&&<div style={{padding:m.media||m.audio?"0 7px 6px":"0"}}>{m.text}</div>}
                <div style={{fontSize:10,opacity:.5,marginTop:2,textAlign:"right",padding:m.media||m.audio?"0 7px 6px":"0"}}>{fmtTime(m.ts)}</div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>

      {/* Input com mídia */}
      <div style={{padding:"10px 14px 32px",borderTop:`1px solid ${T.border}`,background:T.surface}}>
        {/* Preview de imagem/vídeo */}
        {mediaPreview&&(
          <div style={{position:"relative",marginBottom:8,borderRadius:10,overflow:"hidden",maxHeight:120,border:`1px solid ${T.border}`}}>
            {mediaType==="image"
              ?<img src={mediaPreview} alt="" style={{width:"100%",maxHeight:120,objectFit:"cover"}}/>
              :<video src={mediaPreview} style={{width:"100%",maxHeight:120}} controls/>}
            <button onClick={()=>{setMediaPreview(null);setMediaFile(null);setMediaType(null);}} style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:"50%",background:"rgba(0,0,0,.6)",border:"none",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>×</button>
          </div>
        )}
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {/* Attach media */}
          <label style={{width:38,height:38,borderRadius:"50%",background:T.faint,border:`1px solid ${T.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke={T.muted} strokeWidth="1.4"/><circle cx="5.5" cy="6.5" r="1" fill={T.muted}/><path d="M1 10l4-3 3 3 2-2 5 4" stroke={T.muted} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            {/* TODO: migrar chat media pra Storage (imagem+vídeo) — por enquanto segue base64 pois volume é baixo */}
            <input type="file" accept="image/*,video/*" onChange={async e=>{const file=e.target.files[0];if(!file)return;const t=file.type.startsWith("video")?"video":"image";const b64=await fileToB64(file);setMediaPreview(URL.createObjectURL(file));setMediaFile(b64);setMediaType(t);}} style={{display:"none"}}/>
          </label>
          {/* Audio record */}
          <button onClick={toggleRecord} style={{width:38,height:38,borderRadius:"50%",background:isRecording?"#e74c3c":T.faint,border:`1px solid ${isRecording?"#e74c3c":T.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>
            <svg width="14" height="18" viewBox="0 0 14 18" fill="none"><rect x="4" y="1" width="6" height="10" rx="3" stroke={isRecording?"#fff":T.muted} strokeWidth="1.4"/><path d="M1 9c0 3.3 2.7 6 6 6s6-2.7 6-6" stroke={isRecording?"#fff":T.muted} strokeWidth="1.4" strokeLinecap="round"/><path d="M7 15v2" stroke={isRecording?"#fff":T.muted} strokeWidth="1.4" strokeLinecap="round"/></svg>
          </button>
          <input style={{flex:1,borderRadius:50,padding:"11px 18px",fontSize:14}} placeholder="Mensagem…" value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
          <button onClick={send} style={{width:42,height:42,borderRadius:"50%",background:(txt.trim()||mediaFile||audioBlob)?`linear-gradient(135deg,${T.accent},${T.accentDk})`:T.border,border:"none",color:"#fff",cursor:(txt.trim()||mediaFile||audioBlob)?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1 14L14 7.5L1 1V6L10 7.5L1 9V14Z" fill="#fff"/></svg>
          </button>
        </div>
        {isRecording&&<div style={{fontSize:11,color:"#e74c3c",textAlign:"center",marginTop:6,fontWeight:600}}>Gravando… toque novamente para parar</div>}
      </div>
    </div>
  );
}


// ── Componente: Adicionar Outros ─────────────────────────────
function AddOutro({placeholder,onAdd,onRemove,extras=[],color,bgColor}){
  const [val,setVal]=useState("");
  const activeColor=color||T.accent;
  const activeBg=bgColor||T.accentBg;

  function add(){
    const v=val.trim();
    if(!v)return;
    onAdd(v);
    setVal("");
  }

  return(
    <div>
      {extras.length>0&&(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
          {extras.map((item,i)=>(
            <div key={i} style={{
              display:"flex",alignItems:"center",gap:4,
              padding:"5px 10px 5px 12px",borderRadius:20,fontSize:13,
              border:`1.5px solid ${activeColor}`,
              background:activeBg,color:activeColor,fontWeight:600,
            }}>
              {item}
              <button onClick={()=>onRemove(item)} style={{
                background:"none",border:"none",cursor:"pointer",

// ── Sistema de Alertas por Região ────────────────────────────
function useRegionAlerts(user){
  const [alerts,setAlerts]=useState([]);
  const [showAlert,setShowAlert]=useState(false);
  const lastCheck=useRef(null);

  useEffect(()=>{
    if(!user||!user.lugares||user.lugares.length===0)return;

    // Check for new profiles in same region every 30 seconds
    async function checkNewProfiles(){
      const since=lastCheck.current||new Date(Date.now()-86400000).toISOString(); // last 24h on first load
      const userCities=user.lugares.map(l=>l.city).filter(Boolean);
      const userStates=user.lugares.map(l=>l.uf).filter(Boolean);

      if(userCities.length===0&&userStates.length===0)return;

      try{
        // Build OR query for all user cities/states
        const cityFilters=userCities.map(c=>`city.ilike.%${c}%`).join(",");
        const stateFilters=userStates.map(s=>`state.eq.${s}`).join(",");
        const orFilter=[cityFilters,stateFilters].filter(Boolean).join(",");

        const {data}=await db.from("profiles")
          .select("id,name,nick,place_name,city,state,avatar_url")
          .neq("id",user.id)
          .gt("created_at",since)
          .or(orFilter)
          .limit(5);

        if(data&&data.length>0){
          setAlerts(data);
          setShowAlert(true);
          lastCheck.current=new Date().toISOString();
        }
      }catch(e){console.log("Alert check error:",e);}
    }

    checkNewProfiles();
    const interval=setInterval(checkNewProfiles,30000);
    return()=>clearInterval(interval);
  },[user?.id]);

  return{alerts,showAlert,dismiss:()=>setShowAlert(false)};
}

  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const timer=useRef();

  async function searchAddr(q){
    if(q.length<3){setD(v=>({...v,addrSugs:[]}));return;}
    setD(v=>({...v,addrLoading:true}));
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+", Brasil")}&format=json&addressdetails=1&limit=4&accept-language=pt-BR`);
      const data=await r.json();
      setD(v=>({...v,addrSugs:data,addrLoading:false}));
    }catch{setD(v=>({...v,addrLoading:false}));}
  }

  function handleInput(e){
    const val=e.target.value;
    setD(v=>({...v,addrSearch:val,placeName:val}));
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>searchAddr(val),500);
  }

  function selectAddr(s){
    const addr=s.address;
    const city=addr.city||addr.town||addr.village||addr.municipality||addr.county||"";
    const SM={"Acre":"AC","Alagoas":"AL","Amapá":"AP","Amazonas":"AM","Bahia":"BA","Ceará":"CE","Distrito Federal":"DF","Espírito Santo":"ES","Goiás":"GO","Maranhão":"MA","Mato Grosso":"MT","Mato Grosso do Sul":"MS","Minas Gerais":"MG","Pará":"PA","Paraíba":"PB","Paraná":"PR","Pernambuco":"PE","Piauí":"PI","Rio de Janeiro":"RJ","Rio Grande do Norte":"RN","Rio Grande do Sul":"RS","Rondônia":"RO","Roraima":"RR","Santa Catarina":"SC","São Paulo":"SP","Sergipe":"SE","Tocantins":"TO"};
    setD(v=>({...v,addrSearch:s.display_name.split(",")[0],placeName:s.display_name.split(",")[0],city,uf:SM[addr.state]||v.uf,addrSugs:[]}));
  }

  const canSave=!!(d.placeName.trim()&&d.city.trim()&&d.y1&&d.y2);

  async function salvar(){
    if(!canSave||!user)return;
    setSaving(true);
    const novoLugar={placeType:d.placeType,placeName:d.placeName.trim(),city:d.city.trim(),uf:d.uf,pais:d.pais,cep:d.cep,y1:d.y1,y2:d.y2,era:d.era||detectarEra(d.y1,d.y2)};

      await db.from("profiles").update({lugares:novosLugares}).eq("id",user.id);

    syncLugaresToPlaces(user.id, [novoLugar]).catch(e=>console.log("Sync novo lugar:",e));

    setSaving(false);
    setDone(true);

function ModalMomento({user,onClose,onSave,onUpdateUser}){

    const files=Array.from(e.target.files).slice(0,30);
    const previews=files.map(f=>URL.createObjectURL(f));
    setFotos(prev=>[...prev,...previews].slice(0,30));
    setFotosFiles(prev=>[...prev,...files].slice(0,30));
  }

  function removePhoto(i){
    setFotos(v=>v.filter((_,j)=>j!==i));
    setFotosFiles(v=>v.filter((_,j)=>j!==i));
  }

  async function salvar(){
    if(!texto.trim()&&fotos.length===0)return;

    // Upload das fotos do momento antes do insert
    let photoUrls = [];
    if(fotosFiles.length>0){

        console.error("Falha no upload das fotos do momento:", err);
        alert("Não consegui enviar as fotos. Tente novamente.");
        setSaving(false);
        return;
      }

    const momento={
      id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(),

      user_name:user.name,
      avatar:user.avatar_url,
      texto:texto.trim(),
      lugar:lugar.trim(),
      fotos:photoUrls,
      ts:new Date().toISOString(),
    };
    // Salva no banco de momentos
    try{await db.from("momentos").insert(momento);}catch{}
    // Se tiver fotos, salva também no perfil do usuário para contatos verem

        await db.from("profiles").update({photos:novasFotos}).eq("id",user.id);
        // Atualiza localmente
        if(onUpdateUser) onUpdateUser({...user,photos:novasFotos});

    onSave(momento);

// ── Hook: Notificações de Região ──────────────────────────────
function useRegionNotifications(user,contacts){
  const [notif,setNotif]=useState(null); // {type,profile,message}
  const lastCheck=useRef(null);
  const checked=useRef(new Set());

  useEffect(()=>{
    if(!user)return;

    async function check(){
      const since=lastCheck.current||new Date(Date.now()-3600000).toISOString();
      const lugares=user.lugares||[];
      const cidades=[...new Set([
        user.city,
        ...lugares.map(l=>l.city)
      ].filter(Boolean))];
      const estados=[...new Set([
        user.state,
        ...lugares.map(l=>l.uf)
      ].filter(Boolean))];

      if(cidades.length===0&&estados.length===0)return;

      try{
        const orFilter=[
          ...cidades.map(c=>`city.ilike.%${c}%`),
          ...estados.map(s=>`state.eq.${s}`)
        ].join(",");

        const {data}=await db.from("profiles")
          .select("id,name,first_name,last_name,nick,place_name,city,state,year_start,year_end,avatar_url,era")
          .neq("id",user.id)
          .gt("created_at",since)
          .or(orFilter)
          .limit(3);

        if(data&&data.length>0){
          const novo=data.find(p=>!checked.current.has(p.id));
          if(novo){
            checked.current.add(novo.id);
            // Check if same last name
            const meuSobrenome=user.last_name||user.name?.split(" ").slice(-1)[0];
            const sobrenomeIgual=meuSobrenome&&novo.last_name&&
              novo.last_name.toLowerCase()===meuSobrenome.toLowerCase();
            setNotif({
              type:sobrenomeIgual?"mesmo_sobrenome":"novo_usuario",
              profile:novo,
              message:sobrenomeIgual
                ?`${novo.name} (família ${novo.last_name}) se cadastrou em ${novo.city}!`
                :`${novo.name} se cadastrou em ${novo.city}, ${novo.state}`
            });
          }
        }
        lastCheck.current=new Date().toISOString();
      }catch(e){console.log("notif error:",e);}
    }

    check();
    const interval=setInterval(check,30000);
    return()=>clearInterval(interval);
  },[user?.id]);



  return{notif,dismiss:()=>setNotif(null)};
}

// ── Cadastro Simples (3 passos) ──────────────────────────────
function CadastroSimples({onDone, onLogin}){
  const [step, setStep] = useState(0);
  const [saving, setSaving] = useState(false);
  const [f, setF] = useState({
    firstName:"", lastName:"",
    birthYear:"", birthMonth:"", birthDay:"",
    placeType:"escola", placeName:"", city:"", uf:"", country:"Brasil",
    y1:"", y2:"",
    avatarFile:null, avatarPreview:null,
  });

  // Detect age group for adaptive UI
  const ageGroup = (() => {
    const age = new Date().getFullYear() - parseInt(f.birthYear||0);
    if(age >= 55) return "senior";
    if(age >= 35) return "adult";
    return "young";
  })();

  const ageStyle = {
    senior: { fontSize:16, lineHeight:1.8, spacing:"relaxed" },
    adult:  { fontSize:14, lineHeight:1.6, spacing:"normal" },
    young:  { fontSize:14, lineHeight:1.5, spacing:"compact" },
  }[ageGroup];

  const ageLabel = {
    senior: { place:"Onde fica esse lugar especial?", period:"Quando esse lugar fez parte da sua vida?", name:"Como se chama?" },
    adult:  { place:"Onde esse lugar fica?", period:"Quando esse lugar fez parte da sua vida?", name:"Seu nome" },
    young:  { place:"Onde você cresceu ou viveu?", period:"Quando esse lugar fez parte da sua vida?", name:"Como se chama?" },
  }[ageGroup];

  async function handleAvatar(e){
    const file=e.target.files[0]; if(!file)return;
    setF({...f,avatarFile:file,avatarPreview:URL.createObjectURL(file)});
  }

  async function salvar(){
    if(!f.firstName||!f.placeName||!f.y1)return;
    setSaving(true);
    const nome=`${f.firstName.trim()} ${f.lastName.trim()}`.trim();

    // Upload do avatar antes do insert, se houver
    let avatarUrl = null;
    if(f.avatarFile){
      try{
        // Usa um ID temporário — depois sobrescrevemos com o ID real do perfil, mas o arquivo já está no bucket
        const tempId = crypto.randomUUID?crypto.randomUUID():("tmp_"+Date.now());
        avatarUrl = await uploadImage(f.avatarFile, "avatars", tempId);
      }catch(err){
        console.error("Falha no upload do avatar:", err);
        // Continua sem avatar em vez de travar
      }
    }

    const payload={
      name:nome, first_name:f.firstName.trim(), last_name:f.lastName.trim(),
      nick:null, note:null,
      place_type:f.placeType, place_name:f.placeName.trim(),
      city:f.city.trim()||f.placeName.trim(), state:f.uf||"", country:f.country||"Brasil",
      year_start:parseInt(f.y1), year_end:parseInt(f.y2||f.y1),
      era:detectarEra(f.y1, f.y2||f.y1),
      birth_day:f.birthDay?parseInt(f.birthDay):null,
      birth_month:f.birthMonth?parseInt(f.birthMonth):null,
      birth_year:f.birthYear?parseInt(f.birthYear):null,
      avatar_url:avatarUrl,
      available:"sim",
      lugares:[{
        placeType:f.placeType, placeName:f.placeName.trim(),
        city:f.city.trim(), uf:f.uf, pais:f.country,
        y1:f.y1, y2:f.y2||f.y1,
        era:detectarEra(f.y1, f.y2||f.y1),
      }],
    };
    let saved=null;
    try{
      const {data,error}=await db.from("profiles").insert(payload).select().single();
      if(error) throw error;
      saved=data;
    }catch(e){
      console.error("Erro ao salvar perfil:",e);
      // Tenta upsert como fallback
      try{
        const {data}=await db.from("profiles").upsert(payload).select().single();
        saved=data;
      }catch(e2){
        console.error("Erro no upsert:",e2);
        // Salva localmente como último recurso
        saved={...payload,id:"local_"+Date.now()};
      }
    }
    if(saved){
      try{localStorage.setItem("tn_user",JSON.stringify(saved));}catch{}
      try{localStorage.setItem("tn_user_id",saved.id?.toString());}catch{}
      // Sincroniza lugares pra tabela places + place_profiles
      if(saved.id && !saved.id.toString().startsWith("local_")){
        syncLugaresToPlaces(saved.id, saved.lugares||payload.lugares||[]).catch(e=>console.log("Sync lugares:",e));
      }
    }
    setSaving(false);
    onDone(saved||payload);
  }

  const steps = [
    // Step 0: Nome + nascimento
    <div key="s0" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{textAlign:"center",marginBottom:8}}>
        <div style={{fontSize:ageStyle.fontSize+4,fontWeight:700,color:T.text}}>
          {ageGroup==="senior"?"Como você se chama?":"Qual seu nome?"}
        </div>
        <div style={{fontSize:12,color:T.muted,marginTop:4}}>

            autoFocus
          />

        <div>

          <input
            type="number" placeholder="Ex: 2001"
            value={f.y2}
            onChange={e=>setF({...f,y2:e.target.value.slice(0,4)})}
            onBlur={()=>{
              if(f.y1&&f.y2&&parseInt(f.y2)<parseInt(f.y1))
                setF(v=>({...v,y2:String(parseInt(v.y1)+1)}));
            }}
          />
        </div>
      </div>

        const era=eraInfo(detectarEra(f.y1,f.y2||f.y1));
        return(
          <div style={{padding:"12px 14px",background:`${era.color}10`,border:`1.5px solid ${era.color}40`,borderRadius:12,textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:700,color:era.color}}>
              {era.label} · {era.desc}
            </div>
            <div style={{fontSize:11,color:T.muted,marginTop:3}}>
              {detectarEra(f.y1,f.y2||f.y1)==="passado"&&"Suas memórias vão aparecer para pessoas que viveram no mesmo lugar e época!"}
              {detectarEra(f.y1,f.y2||f.y1)==="presente"&&"Você aparecerá para pessoas que moram ou moraram no mesmo lugar!"}
              {detectarEra(f.y1,f.y2||f.y1)==="futuro"&&"Você vai aparecer para pessoas com os mesmos planos!"}
            </div>
          </div>
        );
      })()}

      <div style={{display:"flex",gap:8}}>
        <Btn variant="outline" onClick={()=>setStep(1)}>Voltar</Btn>
        <Btn
          full size="lg"
          disabled={!f.y1||saving}
          onClick={salvar}
        >
          {saving?<><Spinner/>Criando perfil…</>:"Criar meu perfil"}
        </Btn>
      </div>

      <div style={{textAlign:"center",fontSize:11,color:T.muted}}>
        Já tem conta?{" "}
        <span onClick={onLogin} style={{color:T.accent,fontWeight:700,cursor:"pointer"}}>
          Entrar
        </span>
      </div>
    </div>,
  ];

  const progress = ((step+1)/3)*100;

  return(
    <div style={{padding:"0 20px 40px",paddingTop:52,minHeight:"100vh",background:T.bg}}>
      {/* Logo */}
      <div style={{marginBottom:24,textAlign:"center"}}>
        <Logo size="lg"/>
      </div>

      {/* Progress bar */}
      <div style={{background:T.border,borderRadius:20,height:4,marginBottom:28,overflow:"hidden"}}>
        <div style={{
          height:"100%",borderRadius:20,
          background:`linear-gradient(90deg,${T.accent},${T.blue})`,
          width:`${progress}%`,
          transition:"width 0.4s ease",
        }}/>
      </div>

      {/* Step indicator */}
      <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:24}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{
            width:i===step?24:8,height:8,borderRadius:20,
            background:i<=step?T.accent:T.border,
            transition:"all 0.3s",
          }}/>
        ))}
      </div>

      {steps[step]}
    </div>
  );
}

// ── Memória do Dia (Stories 24h) ─────────────────────────────
function MemoriaDoDia({user, contacts, onView}){
  const [memorias, setMemorias] = useState([]);

  useEffect(()=>{
    if(!user&&(!contacts||contacts.length===0))return;
    // Generate memories from user + contacts profiles
    const todos = [user, ...(contacts||[])].filter(Boolean);
    const geradas = todos.map(p=>{
      if(!p||!p.lugares?.length)return null;
      const lugar = p.lugares[Math.floor(Math.random()*p.lugares.length)];
      return { profile:p, lugar, ts:Date.now() };
    }).filter(Boolean).slice(0,8);
    setMemorias(geradas);
  },[user?.id]);

  if(memorias.length===0)return null;

  return(
    <div style={{marginBottom:20}}>
      <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>
        Memórias do dia
      </div>
      <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:6}}>
        {/* Minha memória */}
        {user&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
            <div style={{
              width:56,height:56,borderRadius:"50%",padding:2,
              background:`linear-gradient(135deg,${T.accent},${T.blue})`,
            }}>
              <div style={{
                width:"100%",height:"100%",borderRadius:"50%",
                background:user.avatar_url?"transparent":T.accentBg,
                border:`2px solid ${T.bg}`,
                display:"flex",alignItems:"center",justifyContent:"center",
                overflow:"hidden",
              }}>
                {user.avatar_url
                  ?<img src={user.avatar_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  :<span style={{fontSize:14,fontWeight:700,color:T.accent}}>{user.name?.[0]}</span>
                }
              </div>
            </div>
            <div style={{fontSize:9,color:T.accent,fontWeight:700}}>Você</div>
          </div>
        )}
        {/* Contatos com memórias */}
        {memorias.filter(m=>m.profile.id!==user?.id).map((m,i)=>{
          const era=eraInfo(m.lugar?.era||detectarEra(m.lugar?.y1,m.lugar?.y2));
          return(
            <div key={i} onClick={()=>onView&&onView(m.profile)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0,cursor:"pointer"}}>
              <div style={{
                width:56,height:56,borderRadius:"50%",padding:2,
                background:`linear-gradient(135deg,${era.color},${era.color}88)`,
              }}>
                <div style={{
                  width:"100%",height:"100%",borderRadius:"50%",
                  background:`${era.color}15`,
                  border:`2px solid ${T.bg}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  overflow:"hidden",
                }}>
                  {m.profile.avatar_url
                    ?<img src={m.profile.avatar_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    :<span style={{fontSize:14,fontWeight:700,color:era.color}}>{m.profile.name?.[0]||"?"}</span>
                  }
                </div>
              </div>
              <div style={{fontSize:9,color:T.muted,maxWidth:56,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"center"}}>
                {m.profile.first_name||m.profile.name?.split(" ")[0]}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Quem Passou Por Aqui ──────────────────────────────────────
function QuemPassouPorAqui({user}){
  const [count, setCount] = useState(0);
  const [exemplos, setExemplos] = useState([]);

  useEffect(()=>{
    if(!user?.city&&!user?.state)return;
    const filtro = user.city
      ?`city.ilike.%${user.city}%`
      :`state.eq.${user.state}`;
    db.from("profiles").select("id,name,first_name,avatar_url,year_start,year_end,era")
      .or(filtro).neq("id",user.id).limit(5)
      .then(({data})=>{
        setCount(data?.length||0);
        setExemplos(data?.slice(0,4)||[]);
      }).catch(()=>{});
  },[user?.id]);

  if(count===0)return null;

  return(
    <div style={{background:"#fff",borderRadius:18,padding:"14px 16px",border:`1px solid ${T.border}`,marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:4}}>
        Quem passou por aqui
      </div>
      <div style={{fontSize:11,color:T.muted,marginBottom:12}}>
        <span style={{fontWeight:700,color:T.accent,fontSize:18}}>{count}</span> {count===1?"pessoa viveu":"pessoas viveram"} em {user.city||user.state} ao longo dos anos
      </div>
      <div style={{display:"flex",gap:-6}}>
        {exemplos.map((p,i)=>{
          const era=eraInfo(p.era||"passado");
          return(
            <div key={i} style={{
              width:36,height:36,borderRadius:"50%",
              background:`${era.color}20`,
              border:`2px solid ${T.bg}`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:12,fontWeight:700,color:era.color,
              marginLeft:i>0?-8:0,
              overflow:"hidden",
            }}>
              {p.avatar_url
                ?<img src={p.avatar_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                :(p.first_name?.[0]||p.name?.[0]||"?")}
            </div>
          );
        })}
        {count>4&&(
          <div style={{width:36,height:36,borderRadius:"50%",background:T.accentBg,border:`2px solid ${T.bg}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:T.accent,marginLeft:-8}}>
            +{count-4}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Pergunta da Comunidade ────────────────────────────────────
function PerguntaComunidade({user}){
  const [resposta, setResposta] = useState("");
  const [respondeu, setRespondeu] = useState(false);
  const [saving, setSaving] = useState(false);
  const [totalRespostas, setTotalRespostas] = useState(0);

  // Perguntas inteligentes baseadas no perfil + intenção
  const perguntas = [
    user?.city&&`Quem lembra de algum ponto de encontro famoso em ${user.city}?`,
    user?.place_name&&`Quem tem fotos antigas d${user.place_type==="escola"?"a":"o"} ${user.place_name}?`,
    user?.intencao?.includes("reencontrar")&&user?.city&&`Quem mais quer se reencontrar com pessoas de ${user.city}?`,
    user?.intencao?.includes("relembrar")&&"Qual foi o momento mais marcante do lugar onde você cresceu?",
    user?.intencao?.includes("visitar")&&user?.city&&`Tem fotos recentes de ${user.city} para compartilhar?`,
    user?.intencao?.includes("reconectar")&&"Quem ainda mantém contato com pessoas do mesmo lugar?",
    user?.city&&`Tem alguém de ${user.city} morando fora do Brasil?`,
    user?.last_name&&`Tem mais alguém da família ${user.last_name} aqui no Tempnext?`,
  ].filter(Boolean);

  const pergunta = perguntas[new Date().getDate() % perguntas.length];

  // Load response count from Supabase
  useEffect(()=>{
    if(!pergunta)return;
    db.from("momentos")
      .select("id",{count:"exact"})
      .ilike("texto",`%${pergunta.substring(0,20)}%`)
      .then(({count})=>setTotalRespostas(count||0))
      .catch(()=>{});
  },[pergunta]);

  async function responder(){
    if(!resposta.trim()||saving)return;
    setSaving(true);
    try{
      if(user){
        await db.from("momentos").insert({
          user_id:user.id,
          user_name:user.name,
          avatar:user.avatar_url,
          texto:`[Pergunta do dia] ${pergunta}

${resposta.trim()}`,
          lugar:user.city||"",
          ts:new Date().toISOString(),
        });
      }
      setRespondeu(true);
    }catch(e){setRespondeu(true);}
    setSaving(false);
  }

  if(!pergunta)return null;

  return(
    <div style={{background:`linear-gradient(135deg,${T.accentBg},rgba(66,165,245,0.04))`,borderRadius:18,padding:"14px 16px",border:`1px solid ${T.border}`,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={{fontSize:10,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:"0.08em"}}>
          Pergunta do dia
        </div>
        {totalRespostas>0&&(
          <div style={{fontSize:10,color:T.muted,fontWeight:600}}>
            {totalRespostas} {totalRespostas===1?"resposta":"respostas"}
          </div>
        )}
      </div>
      <div style={{fontSize:13,fontWeight:600,color:T.text,lineHeight:1.6,marginBottom:10}}>
        {pergunta}
      </div>
      {!respondeu?(
        <div style={{display:"flex",gap:8}}>
          <input
            placeholder="Sua resposta..."
            value={resposta}
            onChange={e=>setResposta(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&responder()}
            style={{flex:1,fontSize:12,padding:"8px 12px"}}
          />
          <button
            onClick={responder}
            disabled={saving||!resposta.trim()}
            style={{background:resposta.trim()?T.accent:"#ccc",border:"none",borderRadius:10,padding:"8px 14px",color:"#fff",cursor:resposta.trim()?"pointer":"default",fontSize:12,fontWeight:700,fontFamily:"inherit",flexShrink:0,transition:"background .15s"}}
          >
            {saving?<Spinner/>:"Ok"}
          </button>
        </div>
      ):(
        <div style={{padding:"10px 12px",background:"rgba(255,255,255,0.8)",borderRadius:10,fontSize:12,color:T.sub,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>✅</span>
          <span>Sua resposta foi compartilhada com a comunidade!</span>
        </div>
      )}
    </div>
  );
}

// ── Alerta de Região ──────────────────────────────────────────
function AlertaRegiao({cidade, estado, user}){
  const [count, setCount] = useState(0);
  const [visitantes, setVisitantes] = useState([]);

  useEffect(()=>{
    if(!cidade&&!estado)return;
    // Busca agendas de visita para essa região
    db.from("momentos")
      .select("user_id,user_name,avatar,meta")
      .eq("tipo","agenda_visita")
      .neq("user_id",user?.id||"")
      .then(({data})=>{
        const filtrados=(data||[]).filter(m=>{
          try{
            const meta=JSON.parse(m.meta||"{}");
            return meta.cidade?.toLowerCase()===cidade?.toLowerCase()||
                   meta.estado===estado;
          }catch{return false;}
        });
        setCount(filtrados.length);
        setVisitantes(filtrados.slice(0,4));
      }).catch(()=>{});
  },[cidade]);

  if(count===0)return null;

  return(
    <div style={{background:`linear-gradient(135deg,${T.greenBg},rgba(102,187,106,0.04))`,borderRadius:14,padding:"12px 14px",border:`1px solid rgba(102,187,106,0.3)`,marginBottom:10}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{fontSize:16}}>📍</span>
        <div style={{fontSize:12,fontWeight:700,color:T.green}}>
          {count} {count===1?"pessoa também tem":"pessoas também têm"} conexão com {cidade||estado}
        </div>
      </div>
      <div style={{display:"flex",gap:-4,marginBottom:6}}>
        {visitantes.map((v,i)=>(
          <div key={i} style={{
            width:28,height:28,borderRadius:"50%",
            background:T.greenBg,border:`2px solid ${T.bg}`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:10,fontWeight:700,color:T.green,
            marginLeft:i>0?-6:0,overflow:"hidden",
          }}>
            {v.avatar?<img src={v.avatar} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:v.user_name?.[0]||"?"}
          </div>
        ))}
      </div>
      <div style={{fontSize:10,color:T.muted}}>Quer avisar que você também vai? Crie sua agenda de visita!</div>
    </div>
  );
}

// ── Seguir Lugares (Supabase) ─────────────────────────────────
function useSeguirLugar(placeId, userId){
  const [seguindo, setSeguindo] = useState(false);
  const [loading, setLoading] = useState(false);
  const [totalSeguidores, setTotalSeguidores] = useState(0);

  useEffect(()=>{
    if(!placeId) return;
    // Busca total de seguidores deste lugar
    db.from("followed_places").select("id",{count:"exact"}).eq("place_id",placeId)
      .then(({count})=>setTotalSeguidores(count||0)).catch(()=>{});
    // Verifica se o user segue
    if(!userId) return;
    db.from("followed_places").select("id").eq("user_id",userId).eq("place_id",placeId).maybeSingle()
      .then(({data})=>setSeguindo(!!data)).catch(()=>{});
  },[placeId,userId]);

  async function toggleSeguir(){
    if(!userId||!placeId) return;
    setLoading(true);
    try{
      if(seguindo){
        await db.from("followed_places").delete().eq("user_id",userId).eq("place_id",placeId);
        setSeguindo(false);
        setTotalSeguidores(v=>Math.max(0,v-1));
      }else{
        await db.from("followed_places").insert({user_id:userId,place_id:placeId});
        setSeguindo(true);
        setTotalSeguidores(v=>v+1);
      }
    }catch(err){console.error("Erro ao seguir/deseguir lugar:",err);}
    setLoading(false);
  }

  return{seguindo, toggleSeguir, loading, totalSeguidores};
}

function CapsulaPerfil({capsula, index, userId}){

    revelarEm: capsula.revelarEm||"",
    capsulVis: capsula.capsulVis||"ninguem",
    texto: capsula.texto||"",
  });

  function salvarEdicao(){
    try{
      const capsulas=JSON.parse(localStorage.getItem("tn_capsulas_"+userId)||"[]");
      capsulas[index]={...capsulas[index],...f};
      localStorage.setItem("tn_capsulas_"+userId,JSON.stringify(capsulas));

    setEditando(false);

    try{
      const capsulas=JSON.parse(localStorage.getItem("tn_capsulas_"+userId)||"[]");
