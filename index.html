          <div style={{display:"grid",gridTemplateColumns:"1fr 90px",gap:10}}>
            <div><Lbl>Município *</Lbl><input placeholder="Ex: Campo Verde" value={d.city} onChange={e=>setD({...d,city:e.target.value})}/></div>
            <div><Lbl>Estado</Lbl><select value={d.uf} onChange={e=>setD({...d,uf:e.target.value})}>{STATES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          </div>

          {/* Período */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <Lbl>De (ano) *</Lbl>
              <input type="number" placeholder="1990" value={d.y1}
                onChange={e=>{const v=e.target.value.slice(0,4);setD(prev=>({...prev,y1:v,era:detectarEra(v,prev.y2)}));}}
              />
            </div>
            <div>
              <Lbl>Até (ano) *</Lbl>
              <input type="number" placeholder="2025" value={d.y2}
                onChange={e=>{const v=e.target.value.slice(0,4);setD(prev=>({...prev,y2:v,era:detectarEra(prev.y1,v)}));}}
                onBlur={()=>{if(d.y1&&d.y2&&parseInt(d.y2)<parseInt(d.y1))setD(prev=>({...prev,y2:String(parseInt(prev.y1)+1)}));}}
                style={{borderColor:d.y1&&d.y2&&parseInt(d.y2)<parseInt(d.y1)?"#e74c3c":undefined}}
              />
              {d.y1&&d.y2&&parseInt(d.y2)<parseInt(d.y1)&&(
                <div style={{fontSize:11,color:"#e74c3c",marginTop:3}}>Deve ser maior que {d.y1}</div>
              )}
            </div>
          </div>
          {/* Era detectada */}
          {d.y1&&d.y2&&(()=>{
            const era=eraInfo(d.era||detectarEra(d.y1,d.y2));
            return(
              <div style={{padding:"10px 14px",background:`${era.color}10`,border:`1.5px solid ${era.color}`,borderRadius:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Detectado como</div>
                    <div style={{fontSize:14,fontWeight:700,color:era.color}}>{era.label} · {era.desc}</div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    {ERAS.map(e=>(
                      <div key={e.value} onClick={()=>setD(prev=>({...prev,era:e.value}))} style={{
                        padding:"4px 10px",borderRadius:16,cursor:"pointer",fontSize:11,fontWeight:700,
                        background:d.era===e.value?e.color:"transparent",
                        color:d.era===e.value?"#fff":e.color,
                        border:`1.5px solid ${e.color}`,
                        transition:"all .15s",
                      }}>{e.label}</div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })()}

          {!canSave&&(d.addrSearch||d.city)&&(
            <div style={{fontSize:12,color:T.muted,padding:"8px 12px",background:T.faint,borderRadius:8}}>
              Preencha nome, município e período para salvar.
            </div>
          )}

          <Btn full onClick={salvar} disabled={!canSave||saving} size="lg">
            {saving?<><Spinner/>Salvando…</>:"Salvar lugar"}
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ── Modal: Registrar Momento ──────────────────────────────────
function ModalMomento({user,onClose,onSave,onUpdateUser}){
  const [texto,setTexto]=useState("");
  const [lugar,setLugar]=useState("");
  const [fotos,setFotos]=useState([]);
  const [fotosB64,setFotosB64]=useState([]);
  const [saving,setSaving]=useState(false);

  async function handleFotos(e){
    const files=Array.from(e.target.files).slice(0,30);
    const previews=files.map(f=>URL.createObjectURL(f));
    const b64s=await Promise.all(files.map(fileToB64));
    setFotos(prev=>[...prev,...previews].slice(0,30));
    setFotosB64(prev=>[...prev,...b64s].slice(0,30));
  }

  function removePhoto(i){
    setFotos(v=>v.filter((_,j)=>j!==i));
    setFotosB64(v=>v.filter((_,j)=>j!==i));
  }

  async function salvar(){
    if(!texto.trim()&&fotos.length===0)return;
    setSaving(true);
    const momento={
      id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(),
      user_id:user.id,
      user_name:user.name,
      avatar:user.avatar_url,
      texto:texto.trim(),
      lugar:lugar.trim(),
      fotos:fotosB64,
      ts:new Date().toISOString(),
    };
    // Salva no banco de momentos
    try{await db.from("momentos").insert(momento);}catch{}
    // Se tiver fotos, salva também no perfil do usuário para contatos verem
    if(fotosB64.length>0){
      try{
        const fotosAtuais=user.photos||[];
        const novasFotos=[...fotosAtuais,...fotosB64].slice(0,50);
        await db.from("profiles").update({photos:novasFotos}).eq("id",user.id);
        // Atualiza localmente
        if(onUpdateUser) onUpdateUser({...user,photos:novasFotos});
      }catch(e){console.log("Erro ao salvar fotos no perfil:",e);}
    }
    onSave(momento);
    setSaving(false);
    onClose();
  }

  const canSave=(texto.trim().length>0||fotos.length>0)&&!saving;

  return(
    <div className="fi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:95,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div className="su" onClick={e=>e.stopPropagation()} style={{background:"#FAF7F2",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:430,padding:"0 20px 48px",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{padding:"14px 0 0",display:"flex",justifyContent:"center",marginBottom:16}}>
          <div style={{width:36,height:4,borderRadius:2,background:"#DDD8D0"}}/>
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <Avatar name={user.name} src={user.avatar_url} size={44}/>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:T.text}}>{user.name}</div>
              <div style={{fontSize:12,color:T.green,fontWeight:600}}>Registrando um momento</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:22,lineHeight:1}}>×</button>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* Texto */}
          <div>
            <Lbl>Seu momento</Lbl>
            <textarea
              rows={3}
              placeholder="Ex: Passei por Campo Verde depois de 15 anos. Que saudade! Quem mais está por aqui?"
              value={texto}
              onChange={e=>setTexto(e.target.value)}
              autoFocus
              style={{resize:"vertical"}}
            />
          </div>

          {/* Fotos */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <Lbl>Fotos do momento</Lbl>
              <span style={{fontSize:11,color:T.muted}}>Até 30 fotos</span>
            </div>

            {fotos.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                {fotos.map((src,i)=>(
                  <div key={i} style={{aspectRatio:"1",borderRadius:12,overflow:"hidden",position:"relative",border:`1px solid ${T.border}`}}>
                    <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    <button onClick={()=>removePhoto(i)} style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:"50%",background:"rgba(0,0,0,.6)",border:"none",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1}}>×</button>
                  </div>
                ))}
              </div>
            )}

            {fotos.length<30&&(
              <div style={{display:"flex",gap:8}}>
                {/* Câmera — tirar foto */}
                <label style={{
                  flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,
                  border:`1.5px dashed ${T.accent}`,borderRadius:12,padding:"16px 10px",
                  cursor:"pointer",background:T.accentBg,transition:"all .15s",
                }}>
                  <svg width="24" height="22" viewBox="0 0 24 22" fill="none">
                    <path d="M9 2L7 5H3a2 2 0 00-2 2v12a2 2 0 002 2h18a2 2 0 002-2V7a2 2 0 00-2-2h-4l-2-3H9z" stroke={T.accent} strokeWidth="1.6" strokeLinejoin="round"/>
                    <circle cx="12" cy="12" r="4" stroke={T.accent} strokeWidth="1.6"/>
                  </svg>
                  <span style={{fontSize:12,fontWeight:700,color:T.accent}}>Câmera</span>
                  <input type="file" accept="image/*" capture="environment" multiple onChange={handleFotos} style={{display:"none"}}/>
                </label>

                {/* Galeria — escolher foto */}
                <label style={{
                  flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,
                  border:`1.5px dashed ${T.border}`,borderRadius:12,padding:"16px 10px",
                  cursor:"pointer",background:"#fff",transition:"all .15s",
                }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=T.accent;e.currentTarget.style.background=T.accentBg;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.background="#fff";}}>
                  <svg width="24" height="22" viewBox="0 0 24 22" fill="none">
                    <rect x="2" y="2" width="20" height="18" rx="3" stroke={T.muted} strokeWidth="1.6"/>
                    <circle cx="8" cy="8" r="2" stroke={T.muted} strokeWidth="1.4"/>
                    <path d="M2 14l5-4 4 4 3-3 8 6" stroke={T.muted} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  <span style={{fontSize:12,fontWeight:700,color:T.muted}}>Galeria</span>
                  <input type="file" accept="image/*" multiple onChange={handleFotos} style={{display:"none"}}/>
                </label>
              </div>
            )}
          </div>

          {/* Localização */}
          <div>
            <Lbl>Onde você está? (opcional)</Lbl>
            <input
              placeholder="Ex: Campo Verde, MT · Fazenda Santa Cruz…"
              value={lugar}
              onChange={e=>setLugar(e.target.value)}
            />
          </div>

          <Btn full onClick={salvar} disabled={!canSave} size="lg">
            {saving?<><Spinner/>Registrando…</>:"Registrar momento"}
          </Btn>
        </div>
      </div>
    </div>
  );
}


// ── Tela de Login / Auth ──────────────────────────────────────
function TelaLogin({onClose,onLoggedIn}){
  const [modo,setModo]=useState("opcoes"); // opcoes | email
  const [email,setEmail]=useState("");
  const [loading,setLoading]=useState(false);
  const [enviado,setEnviado]=useState(false);
  const [erro,setErro]=useState("");

  async function loginGoogle(){
    setLoading(true);setErro("");
    try{
      const {error}=await db.auth.signInWithOAuth({
        provider:"google",
        options:{redirectTo:window.location.href}
      });
      if(error)throw error;
    }catch(e){
      setErro("Erro ao conectar com Google: "+e.message);
      setLoading(false);
    }
  }

  async function loginEmail(){
    if(!email.trim()||!email.includes("@")){setErro("Digite um email válido");return;}
    setLoading(true);setErro("");
    try{
      const {error}=await db.auth.signInWithOtp({
        email:email.trim(),
        options:{emailRedirectTo:window.location.href}
      });
      if(error)throw error;
      setEnviado(true);
    }catch(e){
      setErro("Erro: "+e.message);
    }
    setLoading(false);
  }

  return(
    <div className="fi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div className="su" onClick={e=>e.stopPropagation()} style={{background:"#FAF7F2",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:430,padding:"0 24px 52px"}}>
        <div style={{padding:"14px 0 0",display:"flex",justifyContent:"center",marginBottom:4}}>
          <div style={{width:36,height:4,borderRadius:2,background:"#DDD8D0"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 24px"}}>
          <Logo size="lg"/>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#8C8478",fontSize:22}}>×</button>
        </div>

        {enviado?(
          <div style={{textAlign:"center",padding:"20px 0 10px"}}>
            <div style={{fontSize:48,marginBottom:16}}>📧</div>
            <div style={{fontSize:18,fontWeight:700,color:"#1C1C1E",marginBottom:8}}>Verifique seu email</div>
            <div style={{fontSize:14,color:"#8C8478",lineHeight:1.7,marginBottom:24}}>

              {loading?"Conectando…":"Continuar com Google"}

            {/* Divider */}
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1,height:1,background:"#E8E4DE"}}/>

            {/* Email */}
            <button onClick={()=>setModo("email")} style={{
              width:"100%",padding:"14px",borderRadius:12,
              background:"#FAF7F2",border:"1.5px solid #E8E4DE",
              display:"flex",alignItems:"center",justifyContent:"center",gap:12,
              cursor:"pointer",fontSize:15,fontWeight:600,color:"#1C1C1E",
              fontFamily:"inherit",
            }}>
              <svg width="20" height="16" viewBox="0 0 20 16" fill="none"><rect x="1" y="1" width="18" height="14" rx="2" stroke="#8C8478" strokeWidth="1.5"/><path d="M1 4l9 6 9-6" stroke="#8C8478" strokeWidth="1.5" strokeLinecap="round"/></svg>
              Continuar com Email

            {erro&&<div style={{fontSize:13,color:"#C0392B",padding:"10px 14px",background:"rgba(192,57,43,0.06)",borderRadius:8}}>{erro}</div>}
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <button onClick={()=>setModo("opcoes")} style={{background:"none",border:"none",cursor:"pointer",color:"#8C8478",fontSize:13,fontFamily:"inherit",textAlign:"left",marginBottom:4,display:"flex",alignItems:"center",gap:4}}>
              ← Voltar
            </button>
            <div style={{fontSize:16,fontWeight:700,color:"#1C1C1E"}}>Entre com seu email</div>
            <div style={{fontSize:13,color:"#8C8478"}}>Você receberá um link mágico para entrar sem senha</div>
            <input
              type="email"
              placeholder="seu@email.com"
              value={email}
              autoFocus
              onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&loginEmail()}
              style={{fontSize:15}}
            />
            {erro&&<div style={{fontSize:13,color:"#C0392B",padding:"10px 14px",background:"rgba(192,57,43,0.06)",borderRadius:8}}>{erro}</div>}
            <Btn full onClick={loginEmail} disabled={loading||!email.trim()} size="lg">
              {loading?<><Spinner/>Enviando…</>:"Enviar link de acesso"}
            </Btn>
          </div>
        )}

        <div style={{marginTop:20,fontSize:11,color:"#B0A898",textAlign:"center",lineHeight:1.6}}>
          Ao entrar você concorda com os termos de uso.<br/>Seus dados ficam seguros no Tempnext.
        </div>
      </div>
    </div>
  );
}

// ── Hook: Notificações de Região ──────────────────────────────
function useRegionNotifications(user,contacts){
  const [notif,setNotif]=useState(null); // {type,profile,message}
  const lastCheck=useRef(null);
  const checked=useRef(new Set());

  useEffect(()=>{
    if(!user)return;

    async function check(){
      const since=lastCheck.current||new Date(Date.now()-3600000).toISOString();
      const lugares=user.lugares||[];
      const cidades=[...new Set([
        user.city,
        ...lugares.map(l=>l.city)
      ].filter(Boolean))];
      const estados=[...new Set([
        user.state,
        ...lugares.map(l=>l.uf)
      ].filter(Boolean))];

      if(cidades.length===0&&estados.length===0)return;

      try{
        const orFilter=[
          ...cidades.map(c=>`city.ilike.%${c}%`),
          ...estados.map(s=>`state.eq.${s}`)
        ].join(",");

        const {data}=await db.from("profiles")
          .select("id,name,first_name,last_name,nick,place_name,city,state,year_start,year_end,avatar_url,era")
          .neq("id",user.id)
          .gt("created_at",since)
          .or(orFilter)
          .limit(3);

        if(data&&data.length>0){
          const novo=data.find(p=>!checked.current.has(p.id));
          if(novo){
            checked.current.add(novo.id);
            // Check if same last name
            const meuSobrenome=user.last_name||user.name?.split(" ").slice(-1)[0];
            const sobrenomeIgual=meuSobrenome&&novo.last_name&&
              novo.last_name.toLowerCase()===meuSobrenome.toLowerCase();
            setNotif({
              type:sobrenomeIgual?"mesmo_sobrenome":"novo_usuario",
              profile:novo,
              message:sobrenomeIgual
                ?`${novo.name} (família ${novo.last_name}) se cadastrou em ${novo.city}!`
                :`${novo.name} se cadastrou em ${novo.city}, ${novo.state}`
            });
          }
        }
        lastCheck.current=new Date().toISOString();
      }catch(e){console.log("notif error:",e);}
    }

    check();
    const interval=setInterval(check,30000);
    return()=>clearInterval(interval);
  },[user?.id]);



  return{notif,dismiss:()=>setNotif(null)};
}

// ── Banner de Notificação ─────────────────────────────────────
function BannerNotificacao({notif,onDismiss,onView}){
  if(!notif)return null;
  const isAniv=notif.type==="aniversario";
  const bgColor=isAniv?"linear-gradient(135deg,#7B5EA7,#5a3d8a)":"linear-gradient(135deg,#C17E3A,#9A5F22)";
  const icon=isAniv?"🎂":"👋";

  return(
    <div className="fu" style={{
      position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",
      width:"100%",maxWidth:430,zIndex:300,padding:"52px 14px 0",
    }}>
      <div style={{
        background:bgColor,borderRadius:16,padding:"14px 16px",
        boxShadow:"0 8px 32px rgba(0,0,0,0.2)",
        display:"flex",gap:12,alignItems:"center",
      }}>
        <div style={{width:42,height:42,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
          {notif.profile?.avatar_url
            ?<img src={notif.profile.avatar_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/>
            :icon}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {notif.type==="mesmo_sobrenome"&&<span style={{background:"rgba(255,255,255,0.25)",borderRadius:10,padding:"1px 8px",marginRight:6,fontSize:11}}>Família</span>}
            {notif.message}
          </div>
          {!isAniv&&notif.profile&&(
            <div style={{fontSize:11,color:"rgba(255,255,255,0.75)",marginTop:2}}>
              {notif.profile.place_name} · {notif.profile.year_start}–{notif.profile.year_end}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:8,flexShrink:0}}>
          {!isAniv&&<button onClick={()=>{onView(notif.profile);onDismiss();}} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Ver</button>}
          {isAniv&&<button onClick={()=>{onView(notif.profile);onDismiss();}} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Parabenizar</button>}
          <button onClick={onDismiss} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:20,lineHeight:1}}>×</button>
        </div>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────
function App(){
  const [tela,setTela]=useState("inicio");
  const [msgs,setMsgs]=useState({});
  const [contacts,setContacts]=useState([]);
  const [showLogin,setShowLogin]=useState(false);
  const [user,setUser]=useState(()=>{try{const s=localStorage.getItem("tn_user");return s?JSON.parse(s):null;}catch{return null;}});
  const [modal,setModal]=useState(null);
  const [chat,setChat]=useState(null);
  const [showReencontrar,setShowReencontrar]=useState(false);
  const [filtroReencontrar,setFiltroReencontrar]=useState(null);
  const [showMenuRapido,setShowMenuRapido]=useState(false);
  const [showAdicionarLugar,setShowAdicionarLugar]=useState(false);
  const [showMomento,setShowMomento]=useState(false);
  const {alerts,showAlert,dismiss:dismissAlert}=useRegionAlerts(user);

const {notif,dismiss:dismissNotif}=useRegionNotifications(user,contacts);

  // Supabase auth listener
  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{
      if(session?.user&&!user){
        db.from("profiles").select("*").eq("auth_id",session.user.id).maybeSingle()
          .then(({data})=>{
            if(data){setUser(data);try{localStorage.setItem("tn_user",JSON.stringify(data));}catch{}}
          });
      }
    });
    const {data:{subscription}}=db.auth.onAuthStateChange((_event,session)=>{
      if(!session)setUser(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

    // Load contacts from localStorage
  useEffect(()=>{
    try{const c=localStorage.getItem("tn_contacts");if(c)setContacts(JSON.parse(c));}catch{}
  },[]);

  function salvar(p){
    setUser(p);
    try{localStorage.setItem("tn_user",JSON.stringify(p));}catch{}
    setTela("perfil");
  }

  function addContact(p, rel="conhecido"){
    if(contacts.find(c=>c.id===p.id))return;
    const updated=[...contacts,{...p,_rel:rel}];
    setContacts(updated);
    try{localStorage.setItem("tn_contacts",JSON.stringify(updated));}catch{}
  }

  function updateContactRel(id, rel){
    const updated=contacts.map(c=>c.id===id?{...c,_rel:rel}:c);
    setContacts(updated);
    try{localStorage.setItem("tn_contacts",JSON.stringify(updated));}catch{}
  }

  function enviar(cid,msg){setMsgs(prev=>({...prev,[cid]:[...(prev[cid]||[]),msg]}));}

  function abrirChat(p,type="msg"){
    setModal(null);
    if(!user){setTela("cadastrar");return;}
    setChat({dest:p,type});
  }

  function logout(){
    setUser(null);
    setAuthSession(null);
    try{localStorage.removeItem("tn_user");}catch{}
    db.auth.signOut();
  }

  function updateUser(p){
    setUser(p);
    try{localStorage.setItem("tn_user",JSON.stringify(p));}catch{}
  }

  const isContact=(p)=>!!contacts.find(c=>c.id===p.id);

  const unreadCount=Object.entries(msgs).filter(([id,ms])=>
    user&&id.split("_").includes(String(user.id))&&ms.some(m=>m.from!==user.id)
  ).length;

  const NAV=[
    {id:"inicio",    icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 10L10 3l7 7v7H13v-4H7v4H3v-7z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/></svg>, label:"Início"},
    {id:"buscar",    icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" strokeWidth="1.6"/><path d="M14 14l4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>, label:"Buscar"},
    {id:"cadastrar", icon:null, label:""},  // botão +
    {id:"conexoes",  icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M14 17v-1a4 4 0 00-8 0v1M10 10a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/><path d="M17 17v-1a4 4 0 00-3-3.87M3 17v-1a4 4 0 013-3.87" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>, label:"Conexões", badge:contacts.length},
    {id:"perfil",    icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="4" stroke="currentColor" strokeWidth="1.6"/><path d="M3 18a7 7 0 0114 0" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>, label:user?"Perfil":"Entrar"},
  ];

  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:T.bg,position:"relative"}}>
      {tela==="inicio"    &&<Inicio     user={user} onCadastrar={()=>setTela("cadastrar")} onBuscar={()=>setTela("buscar")} onReencontrar={()=>setShowReencontrar(true)} onPerfil={()=>setTela("perfil")} onView={setModal} onAdd={p=>{addContact(p);}} contacts={contacts}/>}
      {tela==="buscar"    &&<Buscar     onView={setModal} onAdd={p=>{addContact(p);}} contacts={contacts}/>}
      {tela==="cadastrar" &&<Cadastrar  onSave={salvar}/>}
      {tela==="conexoes"  &&<Contatos   user={user} contacts={contacts} onChat={abrirChat} onAdd={addContact} onUpdateRel={updateContactRel} onRemove={()=>{}} onCadastrar={()=>setTela("cadastrar")} onBuscar={()=>setTela("buscar")}/>}
      {tela==="perfil"    &&<Perfil     user={user} onLogout={logout} onCadastrar={()=>setTela("cadastrar")} onUpdateUser={updateUser} onLogin={()=>setShowLogin(true)}/>}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(250,247,242,0.96)",backdropFilter:"blur(16px)",borderTop:`1px solid ${T.border}`,display:"flex",alignItems:"center",padding:"8px 0 22px",zIndex:50}}>
        {NAV.map((t,i)=>{
          if(t.id==="cadastrar")return(
            <div key="add" style={{flex:1,display:"flex",justifyContent:"center"}}>
              <button onClick={()=>setShowMenuRapido(true)} style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${T.accent},${T.accentDk})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(193,126,58,0.4)",marginBottom:4}}>
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4v14M4 11h14" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/></svg>
              </button>
            </div>
          );
          const active=tela===t.id;
          return(
            <button key={t.id} onClick={()=>setTela(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 2px",position:"relative",color:active?T.accent:T.muted,transition:"color .15s"}}>
              {t.icon}
              <span style={{fontSize:10,fontWeight:active?700:400,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.label}</span>
              {t.badge>0&&<div style={{position:"absolute",top:2,right:"18%",minWidth:16,height:16,borderRadius:8,background:T.accent,color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{t.badge}</div>}
            </button>
          );
        })}
      </div>

      {showLogin&&<TelaLogin onClose={()=>setShowLogin(false)} onLoggedIn={p=>{setUser(p);setShowLogin(false);}}/>}
      {notif&&<BannerNotificacao notif={notif} onDismiss={dismissNotif} onView={p=>{setModal(p);dismissNotif();}}/>}
      {showMenuRapido&&<MenuRapido
        user={user}
        onClose={()=>setShowMenuRapido(false)}
        onNovoLugar={()=>{setShowMenuRapido(false);setShowAdicionarLugar(true);}}
        onNovaConversa={()=>setTela("conexoes")}
        onMomento={()=>setShowMomento(true)}
        onCompartilhar={()=>{
          if(navigator.share&&user){
            navigator.share({title:"Tempnext",text:`Encontre ${user.name} no Tempnext!`,url:window.location.href});
          }
        }}
      />}
      {showAdicionarLugar&&user&&<ModalAdicionarLugar
        user={user}
        onClose={()=>setShowAdicionarLugar(false)}
        onSave={p=>{setUser(p);try{localStorage.setItem("tn_user",JSON.stringify(p));}catch{};setShowAdicionarLugar(false);}}
      />}
      {showMomento&&user&&<ModalMomento user={user} onClose={()=>setShowMomento(false)} onSave={()=>{}} onUpdateUser={p=>{setUser(p);try{localStorage.setItem("tn_user",JSON.stringify(p));}catch{}}}/>}
      {showReencontrar&&<ModalReencontrar onClose={()=>setShowReencontrar(false)} onBuscar={f=>{setFiltroReencontrar(f);setTela("buscar");}}/>}
      {showAlert&&<AlertaBanner alerts={alerts} onDismiss={dismissAlert} onView={p=>{dismissAlert();setModal(p);}}/>}
      {modal&&<ModalPerfil p={modal} onClose={()=>setModal(null)} onAdd={p=>{addContact(p);setModal(null);}} onChat={abrirChat} user={user} isContact={isContact(modal)}/>}
      {chat&&user&&<ModalChat user={user} dest={chat.dest} type={chat.type||"msg"} msgs={msgs} onSend={enviar} onClose={()=>setChat(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
