<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#FAF7F2}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1C1C1E;-webkit-font-smoothing:antialiased}
input,select,textarea{
  font-family:inherit;background:#fff;
  border:1.5px solid #E8E4DE;border-radius:12px;
  padding:13px 16px;color:#1C1C1E;font-size:15px;
  width:100%;outline:none;-webkit-appearance:none;

input:focus,select:focus,textarea:focus{

  box-shadow:0 0 0 3px rgba(193,126,58,0.12);
}
::placeholder{color:#B0A898}
::-webkit-scrollbar{width:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
.fu{animation:fadeUp .3s ease forwards}
.fi{animation:fadeIn .22s ease}
.su{animation:slideUp .32s cubic-bezier(.32,.72,0,1) forwards}
.pop{animation:pop .2s ease forwards}

<script>
// Som harmônico suave ao carregar
function tocarSomEntrada(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    // Acorde Cm9 — rico, envolvente, melancólico bonito
    const vozes = [
      { freq: 130.81, delay: 0.00, vol: 0.10 },
      { freq: 155.56, delay: 0.08, vol: 0.08 },
      { freq: 196.00, delay: 0.16, vol: 0.07 },
      { freq: 233.08, delay: 0.24, vol: 0.06 },
      { freq: 293.66, delay: 0.32, vol: 0.05 },
    ];
    vozes.forEach(({ freq, delay, vol }) => {
      [freq, freq * 1.002, freq * 0.998].forEach((f, li) => {
        const osc    = ctx.createOscillator();
        const gain   = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200;
        filter.Q.value = 0.5;
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = f;
        const s = ctx.currentTime + delay + li * 0.01;
        const v = vol * (li === 0 ? 1 : 0.4);
        gain.gain.setValueAtTime(0, s);
        gain.gain.linearRampToValueAtTime(v, s + 0.18);
        gain.gain.setValueAtTime(v, s + 0.55);
        gain.gain.exponentialRampToValueAtTime(0.0001, s + 1.4);
        osc.start(s);
        osc.stop(s + 1.6);
      });
    });
  } catch(e){}
}

// Remove loading screen quando React renderiza
const _observer = new MutationObserver(()=>{
  const root = document.getElementById('root');
  if(root && root.children.length > 0){
    const loader = document.getElementById('loading');
    if(loader){
      tocarSomEntrada();
      loader.style.transition = 'opacity 0.5s';
      loader.style.opacity = '0';
      setTimeout(()=>loader.remove(), 500);
    }
    _observer.disconnect();
  }
});
_observer.observe(document.getElementById('root'), {childList:true});
</script>
