<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Tempnext</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#FAF7F2;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1C1C1E;-webkit-font-smoothing:antialiased}
input,select,textarea{
  font-family:inherit;background:#fff;
  border:1.5px solid #E8E4DE;border-radius:12px;
  padding:13px 16px;color:#1C1C1E;font-size:15px;
  width:100%;outline:none;-webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{
  border-color:#C17E3A;
  box-shadow:0 0 0 3px rgba(193,126,58,0.12);
}
::placeholder{color:#B0A898}
::-webkit-scrollbar{width:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
.fu{animation:fadeUp .3s ease forwards}
.fi{animation:fadeIn .22s ease}
.su{animation:slideUp .32s cubic-bezier(.32,.72,0,1) forwards}
.pop{animation:pop .2s ease forwards}
</style>
</head>
<body>
<div id="root"></div>
<div id="loading" style="position:fixed;inset:0;background:#FAF7F2;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:-apple-system,sans-serif">
  <!-- Logo nova -->
  <div style="text-align:center">
    <div style="font-family:Georgia,serif;font-size:32px;font-weight:300;letter-spacing:-0.5px;line-height:1">
      <span style="color:#C17E3A;font-weight:700">Temp</span><span style="color:#1E88E5;font-weight:700">next</span>
    </div>
    <div style="font-size:11px;color:#8C8478;margin-top:6px;letter-spacing:0.15em;text-transform:uppercase">O tempo no seu lugar</div>
  </div>
  <!-- Bolinhas -->
  <div style="display:flex;gap:6px;margin-top:28px">
    <div style="width:8px;height:8px;border-radius:50%;background:#C17E3A;animation:pulse 1.2s ease-in-out infinite"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#1E88E5;animation:pulse 1.2s ease-in-out 0.2s infinite"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#9575CD;animation:pulse 1.2s ease-in-out 0.4s infinite"></div>
  </div>
</div>
<style>
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
</style>
<script>
// Som harmônico suave ao carregar
function tocarSomEntrada(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    // Acorde Cm9 — rico, envolvente, melancólico bonito
    const vozes = [
      { freq: 130.81, delay: 0.00, vol: 0.10 },
      { freq: 155.56, delay: 0.08, vol: 0.08 },
      { freq: 196.00, delay: 0.16, vol: 0.07 },
      { freq: 233.08, delay: 0.24, vol: 0.06 },
      { freq: 293.66, delay: 0.32, vol: 0.05 },
    ];
    vozes.forEach(({ freq, delay, vol }) => {
      [freq, freq * 1.002, freq * 0.998].forEach((f, li) => {
        const osc    = ctx.createOscillator();
        const gain   = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200;
        filter.Q.value = 0.5;
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = f;
        const s = ctx.currentTime + delay + li * 0.01;
        const v = vol * (li === 0 ? 1 : 0.4);
        gain.gain.setValueAtTime(0, s);
        gain.gain.linearRampToValueAtTime(v, s + 0.18);
        gain.gain.setValueAtTime(v, s + 0.55);
        gain.gain.exponentialRampToValueAtTime(0.0001, s + 1.4);
        osc.start(s);
        osc.stop(s + 1.6);
      });
    });
  } catch(e){}
}

// Remove loading screen quando React renderiza
const _observer = new MutationObserver(()=>{
  const root = document.getElementById('root');
  if(root && root.children.length > 0){
    const loader = document.getElementById('loading');
    if(loader){
      tocarSomEntrada();
      loader.style.transition = 'opacity 0.5s';
      loader.style.opacity = '0';
      setTimeout(()=>loader.remove(), 500);
    }
    _observer.disconnect();
  }
});
_observer.observe(document.getElementById('root'), {childList:true});
</script>

// ── Progressive Profiling: progresso do perfil ──────────────
function calcularProgresso(user) {
  if (!user) return {
    pct: 0,
    pendentes: []
  };
  var campos = [{
    id: "avatar",
    label: "Foto",
    feito: !!user.avatar_url
  }, {
    id: "lastName",
    label: "Sobrenome",
    feito: !!(user.last_name && user.last_name.trim())
  }, {
    id: "birth",
    label: "Data de nascimento",
    feito: !!user.birth_year
  }, {
    id: "capa",
    label: "Foto de capa",
    feito: !!(user.photos && user.photos.length > 0)
  }, {
    id: "tema",
    label: "Cor do app",
    feito: !!user.tema
  }];
  var feitos = campos.filter(function (c) {
    return c.feito;
  }).length;
  var pct = Math.round(feitos / campos.length * 100);
  var pendentes = campos.filter(function (c) {
    return !c.feito;
  });
  return {
    pct: pct,
    pendentes: pendentes,
    total: campos.length,
    feitos: feitos
  };
}
